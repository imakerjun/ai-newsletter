.lens-prose .callout { display: flex; gap: 12px; padding: 14px 16px; border-radius: var(--fl-radius-md); background: var(--fl-tint-purple-bg); margin: 0 0 16px; line-height: 1.6; }

.quiz-explain { display: none; margin-top: 12px; padding: 11px 14px; background: var(--fl-surface-2); border-radius: var(--fl-radius); font-size: 13.5px; line-height: 1.65; color: var(--fl-text-secondary); }

.lens__footer { margin-top: 48px; padding-top: 22px; border-top: 1px solid var(--fl-border-subtle); color: var(--fl-text-tertiary); font-size: 12.5px; line-height: 1.7; }

const LENS_DOC = {
  meta: {

    oneliner: "Claude가 외부 함수·API를 ‘언제·어떻게’ 호출할지 정하는 계약. 5가지 렌즈로 다시 읽습니다.",

      body: `
        <h3>‘tool’과 ‘function calling’ — 두 이름, 같은 개념</h3>
        <div class="etymo"><b>tool</b><span>← 고대영어 <code>tōl</code> ‘일을 하기 위한 도구’ ← 게르만어 ‘만들다·준비하다’ 계열</span></div>
        <p>Claude 문서는 이 기능을 <strong>tool use(도구 사용)</strong>라 부르고, 업계에서는 흔히 <strong>function calling(함수 호출)</strong>이라 부릅니다. 모델이 직접 코드를 실행하는 게 아니라 ‘어떤 함수를, 어떤 인자로 부를지’를 정해 <strong>구조화된 호출</strong>을 내놓는다는 점에서 둘은 같은 것을 가리킵니다.</p>
        <div class="callout"><span class="callout__i">💡</span><p>핵심 직관: 모델은 ‘손’이 아니라 ‘지시를 내리는 두뇌’입니다. 망치를 휘두르는 건 여러분의 코드(또는 Anthropic 서버)이고, 모델은 “이 망치를 이렇게 써라”라고 말할 뿐이에요.</p></div>

        <div class="etymo"><b>agentic loop</b><span>agent(라틴어 <code>agere</code> ‘행하다’)+loop. 모델이 도구를 부르고 결과를 받아 다시 도는 ‘행동하는 반복’.</span></div>

        <p style="color:var(--fl-text-tertiary);font-size:13px">※ 어원 해석은 이해를 돕기 위한 학습용 연결이며, 공식 작명 의도와 다를 수 있습니다.</p>

      body: `
        <h3>핵심 7줄</h3>
        <ul>
          <li><strong>도구 사용 = 모델과 앱의 ‘계약’.</strong> 가능한 작업과 입출력 형태를 정의하면, Claude가 ‘언제·어떻게 부를지’를 결정합니다. 모델 스스로 실행하지는 않습니다.</li>
          <li><strong>실행 위치로 갈린다.</strong> 클라이언트 도구(사용자 정의 + bash·text_editor 등)는 내 코드가 실행하고, 서버 도구(web_search·code_execution·web_fetch·tool_search)는 Anthropic이 실행합니다.</li>

        <h3>클라이언트 도구 정의하기</h3>
        <p>클라이언트 도구는 요청의 최상위 <code>tools</code> 배열에 지정합니다. 각 정의는 다음을 포함합니다.</p>

        <h3>도구 정의 모범 사례</h3>
        <ul>
          <li><strong>매우 상세한 설명을 제공하세요.</strong> 도구 성능에서 가장 중요한 요소입니다. 무엇을 하는지, 언제 써야(쓰지 말아야) 하는지, 각 매개변수의 의미와 영향, 반환하지 않는 정보 같은 한계까지 적습니다. 설명당 최소 3~4문장, 복잡하면 더 길게.</li>
          <li><strong>복잡한 도구엔 input_examples를 고려하세요.</strong> 중첩 객체·형식에 민감한 입력이 있으면 스키마 검증된 예제를 제공합니다.</li>
          <li><strong>관련 작업은 더 적은 도구로 통합하세요.</strong> <code>create_pr</code>·<code>review_pr</code>·<code>merge_pr</code> 대신 <code>action</code> 매개변수가 있는 단일 도구로 묶으면 선택의 모호성이 줄어듭니다.</li>
          <li><strong>의미 있는 네임스페이스를 쓰세요.</strong> 여러 서비스에 걸치면 접두사를 붙입니다(예: <code>github_list_prs</code>, <code>slack_send_message</code>).</li>
          <li><strong>도구 응답은 중요한 정보만.</strong> 의미 있고 안정적인 식별자(슬러그·UUID)를 반환하고, 다음 단계 추론에 필요한 필드만 담습니다. 불필요하게 큰 응답은 컨텍스트를 낭비합니다.</li>
        </ul>
        <div class="tp"><p>좋은 설명 예 — 도구가 무엇을 반환하고, 언제 쓰며, <code>ticker</code> 인자가 무엇인지 명확합니다.
        <details><summary>JSON 원문(좋은 예) — 복사용</summary><pre>{
  "name": "get_stock_price",
  "description": "Retrieves the current stock price for a given ticker symbol. The ticker symbol must be a valid symbol for a publicly traded company on a major US stock exchange like NYSE or NASDAQ. The tool will return the latest trade price in USD. It should be used when the user asks about the current or most recent price of a specific stock. It will not provide any other information about the stock or company.",
  "input_schema": {
    "type": "object",
    "properties": {
      "ticker": {
        "type": "string",
        "description": "The stock ticker symbol, e.g. AAPL for Apple Inc."
      }
    },
    "required": ["ticker"]
  }
}</pre></details></p></div>

        <h3>Claude가 도구를 사용하는 시점</h3>
        <p>기본 <code>tool_choice</code>인 <code>{"type": "auto"}</code>에서 Claude는 턴마다 도구를 호출할지 직접 답할지 결정합니다. 요청이 도구의 기능에 매핑되고 답이 아직 컨텍스트에 없으면 호출하고, 안정적 지식·창의 작업·대화형 턴엔 직접 답합니다. 시스템 프롬프트로 이 경계를 조정할 수 있습니다 — 예를 들어 “응답 전에 도구로 조사하라” 같은 가벼운 지시는 도구 사용을 늘리고, “네 판단에 맡겨라”는 보수적으로 유지합니다.</p>

        <h3>도구 사용 강제하기(tool_choice)</h3>
        <p>특정 도구를 꼭 쓰게 하려면 <code>tool_choice</code>에 도구를 지정합니다. 네 가지 옵션이 있습니다.</p>
        <ul>
          <li><strong>auto</strong> — Claude가 호출 여부를 결정(<code>tools</code> 제공 시 기본값).</li>
          <li><strong>any</strong> — 제공된 도구 중 하나는 꼭 쓰되, 특정 도구를 강제하진 않음.</li>
          <li><strong>tool</strong> — 항상 특정 도구를 쓰도록 강제.</li>
          <li><strong>none</strong> — 어떤 도구도 쓰지 못하게 함(<code>tools</code> 미제공 시 기본값).</li>
        </ul>
        <div class="tp"><p>특정 도구 강제 형태입니다.
        <details><summary>설정 원문 — 복사용</summary><pre>tool_choice = {"type": "tool", "name": "get_weather"}</pre></details></p></div>
        <p><code>any</code> 또는 <code>tool</code>로 설정하면 API가 도구 사용을 강제하려고 어시스턴트 메시지를 미리 채우므로, <code>tool_use</code> 블록 앞에 자연어 설명이 생성되지 않습니다. 자연어 컨텍스트도 받고 싶다면 <code>auto</code>를 유지하고 사용자 메시지에 “…응답에 get_weather 도구를 사용하라”처럼 지시를 더하세요. 또한 프롬프트 캐싱 사용 시 <code>tool_choice</code>를 바꾸면 캐시된 메시지 블록이 무효화되며, 확장 사고와 함께 쓸 때 <code>any</code>·<code>tool</code>은 지원되지 않습니다.</p>

        <h3>도구를 사용한 모델 응답</h3>
        <p>Claude는 도구를 호출하기 전에 무엇을 할지 자연스럽게 언급하는 경우가 많습니다. 예를 들어 “지금 샌프란시스코 날씨와 시각은?”에는 텍스트 블록과 <code>tool_use</code> 블록을 함께 담아 응답할 수 있습니다. 코드는 이런 텍스트를 다른 생성 텍스트와 동일하게 다루고, 특정 형식 규칙에 의존하지 말아야 합니다.</p>
        <div class="tp"><p>텍스트 안내 + 도구 호출이 함께 담긴 어시스턴트 응답 예입니다.
        <details><summary>JSON 원문 — 복사용</summary><pre>{
  "role": "assistant",
  "content": [
    {
      "type": "text",
      "text": "I'll help you check the current weather and time in San Francisco."
    },
    {
      "type": "tool_use",
      "id": "toolu_01A09q90qw90lq917835lq9",
      "name": "get_weather",
      "input": { "location": "San Francisco, CA" }
    }
  ]
}</pre></details></p></div>

        <h3>도구를 써야 할 때 / 쓰지 말아야 할 때</h3>
        <p>도구 사용은 텍스트만으로 할 수 없는 일을 요구할 때 적합합니다 — 부작용이 있는 작업(이메일 전송·파일 쓰기·레코드 갱신), 최신·외부 데이터(현재 가격·오늘 날씨·DB 내용), 형태가 보장된 구조화 출력, 기존 시스템 호출. ‘모델 출력에서 결정을 뽑으려고 정규식을 쓰고 있다면, 그 결정은 도구 호출이었어야 한다’가 신호입니다.</p>
        <p>반대로 학습만으로 답할 수 있는 경우(요약·번역·일반 지식), 부작용 없는 일회성 Q&A, 도구 왕복 지연이 작업 자체를 압도하는 가벼운 작업에는 적합하지 않습니다. 모든 도구 호출은 최소 한 번의 추가 왕복임을 기억하세요.</p>

        <h3>가격 책정</h3>
        <p>도구 사용 요청은 (1) 모델에 보낸 총 입력 토큰(<code>tools</code> 매개변수 포함), (2) 생성된 출력 토큰, (3) 서버 도구의 경우 사용량 기반 추가 요금(예: 웹 검색은 검색당 과금)으로 가격이 매겨집니다. 추가 토큰은 <code>tools</code> 정의, <code>tool_use</code> 블록, <code>tool_result</code> 블록에서 발생합니다. 또한 <code>tools</code>를 쓰면 도구 사용을 켜는 특수 시스템 프롬프트가 자동 포함되며, 그 토큰 수는 모델·<code>tool_choice</code>에 따라 다릅니다(예: Claude Opus 4.8은 <code>auto</code>/<code>none</code>에서 290토큰, <code>any</code>/<code>tool</code>에서 410토큰). 이 수치는 일반 입출력 토큰에 더해져 총비용을 이룹니다.</p>

        <h3>더 읽기</h3>
        <ul>
          <li>개념 이해: <a href="https://platform.claude.com/docs/ko/agents-and-tools/tool-use/how-tool-use-works" target="_blank" rel="noopener">도구 사용의 작동 방식 ↗</a></li>
          <li>구현 가이드: <a href="https://platform.claude.com/docs/ko/agents-and-tools/tool-use/define-tools" target="_blank" rel="noopener">도구 정의하기 ↗</a></li>
        </ul>
        <p style="color:var(--fl-text-tertiary);font-size:12.5px">※ 학습용 한국어 번역본입니다. 표현은 이해를 돕기 위해 다듬었으며, 정확한 원문은 출처 링크를 확인하세요.</p>
      `
    }
  ]
};

(function () {
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  const d = LENS_DOC, m = d.meta, lenses = d.lenses;

  // 헤더
  document.getElementById("head").innerHTML = `
    <div class="lens__icon">${esc(m.icon)}</div>
    <span class="lens__eyebrow">📚 깊이 읽기 · 5가지 렌즈</span>
    <h1 class="lens__title">${esc(m.title)}</h1>
    <p class="lens__oneliner">${esc(m.oneliner)}</p>
    <div class="lens__source">
      <span>📄 출처 <a href="${esc(m.sourceUrl)}" target="_blank" rel="noopener">${esc(m.sourceTitle)} ↗</a></span>
      <span>🗓️ ${esc(m.fetched)}</span>
      <span>🏷️ ${m.tags.map(esc).join(" · ")}</span>
    </div>`;

  // 탭
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = lenses.map((l, i) => `
    <button class="lens-tab" role="tab" data-i="${i}" aria-selected="${i === 0}">${esc(l.icon)} ${esc(l.label)}</button>`).join("");

  const panelEl = document.getElementById("panel");
  function renderQuiz(items) {
    return items.map((it, qi) => `
      <div class="quiz-item">
        <p class="quiz-q"><span>Q${qi + 1}.</span>${esc(it.q)}</p>
        <div class="quiz-opts" data-answer="${it.answer}">
          ${it.options.map((o, oi) => `
            <button class="quiz-opt" type="button" data-oi="${oi}">
              <span class="quiz-opt__mark">${String.fromCharCode(65 + oi)}</span><span>${esc(o)}</span>
            </button>`).join("")}
        </div>
        <div class="quiz-explain"><b>해설.</b> ${esc(it.explain)}</div>
      </div>`).join("");
  }
  function render(i) {
    const l = lenses[i];
    panelEl.innerHTML = `
      ${l.hint ? `<div class="lens-panel__hint"><span>${esc(l.icon)}</span><span>${l.hint}</span></div>` : ""}
      ${l.kind === "quiz" ? renderQuiz(l.quiz) : `<div class="lens-prose">${l.body}</div>`}`;
    panelEl.className = "lens-panel";
  }
  tabsEl.addEventListener("click", (e) => {
    const b = e.target.closest(".lens-tab");
    if (!b) return;
    const i = +b.dataset.i;
    tabsEl.querySelectorAll(".lens-tab").forEach((t) => t.setAttribute("aria-selected", String(+t.dataset.i === i)));
    render(i);
  });
  render(0);

  // 퀴즈 채점 (위임)
  panelEl.addEventListener("click", (e) => {
    const opt = e.target.closest(".quiz-opt");
    if (!opt) return;
    const opts = opt.closest(".quiz-opts");
    if (opt.disabled) return;
    const answer = +opts.dataset.answer;
    const chosen = +opt.dataset.oi;
    opts.querySelectorAll(".quiz-opt").forEach((b) => {
      b.disabled = true;
      const oi = +b.dataset.oi;
      if (oi === answer) b.classList.add("quiz-opt--correct");
      if (oi === chosen && chosen !== answer) b.classList.add("quiz-opt--wrong");
    });
    const ex = opts.parentElement.querySelector(".quiz-explain");
    if (ex) ex.classList.add("open");
  });

  // 푸터
  document.getElementById("foot").innerHTML = `
    <footer class="lens__footer">
      <p>📚 <b>깊이 읽기</b> — 어려운 문서를 5가지 렌즈로 다시 읽는 학습 페이지. 원문을 대체하지 않으며, 정확한 내용은 출처를 확인하세요.</p>
      <p>Folio 디자인 시스템 기반 · 단일 HTML(외부 의존성 없음, 폰트 CDN 제외) · 학습 템플릿: doc-lenses 각색</p>
    </footer>`;
})();

/* 테마 — 기본 시스템 따름, 클릭 시 고정 */
(function () {
  const root = document.documentElement, body = document.body;
  const btn = document.getElementById("themeBtn");
  const mq = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
  const saved = () => { try { return localStorage.getItem("nl-theme"); } catch (e) { return null; } };
  const dark = () => { const s = saved(); return s === "dark" ? true : s === "light" ? false : (mq ? mq.matches : false); };
  const apply = () => body.classList.toggle("fl-dark", dark());
  btn.addEventListener("click", () => { const n = dark() ? "light" : "dark"; try { localStorage.setItem("nl-theme", n); } catch (e) {} root.dataset.nlTheme = n; apply(); });
  if (mq) mq.addEventListener("change", () => { if (!saved()) apply(); });
  apply();
})();
</script>
