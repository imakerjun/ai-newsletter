      hint: "낯선 용어가 <b>어디서 왔는지</b>부터 풀면 개념이 친숙해집니다. (학습용 해석)",
      body: `
        <h3>'effort' — 라틴어 '힘을 밖으로 쏟다'에서</h3>
        <div class="etymo"><b>effort</b><span>← 고대 프랑스어 <code>esfort</code> ← 라틴어 <code>ex-</code>(밖으로)+<code>fortis</code>(강한·힘) → '힘을 밖으로 쏟다'</span></div>
        <p>영어 <strong>effort</strong>는 '애씀·수고·들이는 힘'을 뜻합니다. 어근을 풀면 '강함(<code>fortis</code>)을 밖으로(<code>ex-</code>) 내보낸다'예요. 같은 <code>fortis</code> 계열에 <strong>force</strong>(힘), <strong>fort</strong>(요새), <strong>comfort</strong>(함께 힘을 줌 → 위로)가 있습니다.</p>
        <div class="callout"><span class="callout__i">💡</span><p>이름이 곧 기능의 힌트입니다. <code>effort</code> 매개변수는 모델이 <strong>한 응답에 얼마나 '힘을 들일지'</strong> — 즉 토큰을 얼마나 적극적으로 쓸지 — 조절하는 손잡이예요. 높이면 더 깊이 파고, 낮추면 힘을 아껴 빠르게 끝냅니다.</p></div>
        <h3>곁들이면 좋은 용어 어원</h3>
        <div class="etymo"><b>token</b><span>← 고대 영어 <code>tacen</code> '표시·징표'. 모델이 글을 잘게 쪼갠 처리 단위. effort는 이 토큰을 얼마나 쓸지에 영향을 줍니다.</span></div>

        <div class="etymo"><b>adaptive</b><span>← 라틴어 <code>adaptare</code> '맞추다'. '적응형 사고'는 요청마다 사고량을 알아서 맞춥니다. effort는 그 깊이를 조절합니다.</span></div>
        <p style="color:var(--fl-text-tertiary);font-size:13px">※ 어원 해석은 이해를 돕기 위한 학습용 연결이며, 공식 작명 의도와 다를 수 있습니다.</p>

      hint: "30초 안에 핵심만. 자세한 근거는 다른 렌즈와 <b>원문</b>에서.",

        <h3>핵심 7줄</h3>
        <ul>
          <li><strong>한 손잡이로 토큰을 조절합니다.</strong> <code>effort</code>는 Claude가 응답에 토큰을 얼마나 적극적으로 쓸지 정해, 철저함과 효율(속도·비용)의 균형을 단일 모델로 맞춥니다.</li>

        <div class="tp"><p>같은 요청의 Python SDK 버전입니다. <code>output_config={"effort": "medium"}</code>만 추가하면 됩니다.
        <details><summary>프롬프트 원문(영어) — 복사용</summary><pre>import anthropic

client = anthropic.Anthropic()

response = client.messages.create(
    model="claude-opus-4-8",
    max_tokens=4096,
    messages=[
        {
            "role": "user",
            "content": "Analyze the trade-offs between microservices and monolithic architectures",
        }
    ],
    output_config={"effort": "medium"},
)

print(response.content[0].text)</pre></details></p></div>

        <h3>effort를 조정해야 하는 경우</h3>
        <ul>
          <li><strong>max</strong> — 제약 없이 가장 철저한 추론과 가장 깊은 분석이 필요할 때.</li>
          <li><strong>xhigh</strong> — 반복적 도구 호출·상세 검색 등 확장된 탐색이 필요한 고급 코딩·복잡한 에이전트 작업.</li>
          <li><strong>high(기본값)</strong> — 복잡한 추론, 미묘한 분석, 어려운 코딩, 또는 속도·비용보다 품질이 중요한 작업.</li>
          <li><strong>medium</strong> — high의 전체 토큰 소비 없이 견고한 성능을 원할 때의 균형 옵션.</li>
          <li><strong>low</strong> — 속도·비용 최적화. 간단한 분류, 빠른 조회, 또는 미미한 품질 향상이 추가 지연·비용을 정당화하지 못하는 대용량 사용 사례.</li>
        </ul>
        <div class="callout"><span class="callout__i">💡</span><p>Claude Code의 <strong>ultracode</strong> 모드는 effort 메뉴에 보이지만 추가 API effort 수준이 아닙니다. 이 문서의 값이 API가 허용하는 전체 집합입니다. ultracode는 <code>xhigh</code> 수준과 멀티 에이전트 워크플로 상시 권한을 결합한 것입니다.</p></div>

        <h3>도구 사용과 effort</h3>
        <p>도구를 쓸 때 effort는 도구 호출에 대한 설명과 도구 호출 자체 모두에 영향을 줍니다. 더 낮은 수준은 여러 작업을 더 적은 도구 호출로 결합하고, 호출 수가 적고, 서두 없이 바로 진행하며, 완료 후 간결한 확인을 하는 경향이 있습니다. 더 높은 수준은 더 많은 호출을 하고, 수행 전 계획을 설명하며, 상세한 변경 요약과 더 포괄적인 코드 주석을 포함할 수 있습니다.</p>

        <h3>확장 사고와 effort</h3>
        <p>effort는 확장 사고와 함께 작동하며 동작은 모델별로 다릅니다.</p>
        <ul>
          <li><strong>Fable 5 / Mythos 5</strong> — 항상 켜진 적응형 사고를 사용합니다(<code>thinking</code> 구성 불필요). <code>thinking: {type: "disabled"}</code>는 거부됩니다. effort가 사고 깊이를 제어합니다.</li>
          <li><strong>Opus 4.8</strong> — 적응형 사고(<code>thinking: {type: "adaptive"}</code>)를 쓰며 effort가 사고 깊이를 제어합니다. 수동 확장 사고(<code>budget_tokens</code>)는 지원되지 않아 400 오류를 냅니다. <code>high</code>/<code>xhigh</code>/<code>max</code>에선 거의 항상 깊이 사고하고, 낮은 수준에선 간단한 문제에 사고를 건너뛸 수 있습니다. 사고를 켜려면 <code>thinking: {type: "adaptive"}</code>를 설정하세요(미설정 시 사고 없이 실행).</li>
          <li><strong>Opus 4.7</strong> — 적응형 사고를 쓰며 수동 확장 사고는 더 이상 지원되지 않습니다.</li>
          <li><strong>Opus 4.6</strong> — 적응형 사고를 권장하며 <code>budget_tokens</code>는 허용되지만 더 이상 권장되지 않습니다.</li>
          <li><strong>Sonnet 4.6</strong> — 적응형 사고를 쓰며(effort가 깊이 제어), interleaved 모드 수동 사고는 작동하지만 더 이상 권장되지 않습니다.</li>
          <li><strong>Opus 4.5</strong> — 수동 사고를 쓰며 effort가 사고 토큰 예산과 함께 작동합니다.</li>
        </ul>
        <p>effort는 확장 사고 활성화 여부와 무관하게 쓸 수 있으며, 사고 없이도 텍스트 응답·도구 호출의 전체 토큰 사용을 제어합니다.</p>

        <h3>모범 사례</h3>
        <ul>
          <li><strong>effort를 명시적으로 설정하세요.</strong> 기본값은 <code>high</code>지만 적정 시작점은 모델·워크로드마다 다릅니다.</li>
          <li><strong>속도 민감·간단한 작업엔 low.</strong> 지연이 중요하거나 작업이 단순하면 low가 응답 시간·비용을 크게 줄입니다.</li>
          <li><strong>사용 사례를 테스트하세요.</strong> 영향은 작업 유형마다 다르므로 배포 전 평가하세요.</li>
          <li><strong>동적 effort를 고려하세요.</strong> 간단한 쿼리는 low, 에이전트 코딩·복잡한 추론은 high가 유리합니다.</li>
        </ul>

        <p style="color:var(--fl-text-tertiary);font-size:12.5px">※ 학습용 한국어 번역본입니다. 표현은 이해를 돕기 위해 다듬었으며, 정확한 원문은 출처 링크를 확인하세요.</p>
      `
    }
  ]
};

(function () {
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  const d = LENS_DOC, m = d.meta, lenses = d.lenses;

  // 헤더
  document.getElementById("head").innerHTML = `
    <div class="lens__icon">${esc(m.icon)}</div>
    <span class="lens__eyebrow">📚 깊이 읽기 · 5가지 렌즈</span>
    <h1 class="lens__title">${esc(m.title)}</h1>
    <p class="lens__oneliner">${esc(m.oneliner)}</p>
    <div class="lens__source">
      <span>📄 출처 <a href="${esc(m.sourceUrl)}" target="_blank" rel="noopener">${esc(m.sourceTitle)} ↗</a></span>
      <span>🗓️ ${esc(m.fetched)}</span>
      <span>🏷️ ${m.tags.map(esc).join(" · ")}</span>
    </div>`;

  // 탭
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = lenses.map((l, i) => `
    <button class="lens-tab" role="tab" data-i="${i}" aria-selected="${i === 0}">${esc(l.icon)} ${esc(l.label)}</button>`).join("");

  const panelEl = document.getElementById("panel");
  function renderQuiz(items) {
    return items.map((it, qi) => `
      <div class="quiz-item">
        <p class="quiz-q"><span>Q${qi + 1}.</span>${esc(it.q)}</p>
        <div class="quiz-opts" data-answer="${it.answer}">
          ${it.options.map((o, oi) => `
            <button class="quiz-opt" type="button" data-oi="${oi}">
              <span class="quiz-opt__mark">${String.fromCharCode(65 + oi)}</span><span>${esc(o)}</span>
            </button>`).join("")}
        </div>
        <div class="quiz-explain"><b>해설.</b> ${esc(it.explain)}</div>
      </div>`).join("");
  }
  function render(i) {
    const l = lenses[i];
    panelEl.innerHTML = `
      ${l.hint ? `<div class="lens-panel__hint"><span>${esc(l.icon)}</span><span>${l.hint}</span></div>` : ""}
      ${l.kind === "quiz" ? renderQuiz(l.quiz) : `<div class="lens-prose">${l.body}</div>`}`;
    panelEl.className = "lens-panel";
  }
  tabsEl.addEventListener("click", (e) => {
    const b = e.target.closest(".lens-tab");
    if (!b) return;
    const i = +b.dataset.i;
    tabsEl.querySelectorAll(".lens-tab").forEach((t) => t.setAttribute("aria-selected", String(+t.dataset.i === i)));
    render(i);
  });
  render(0);

  // 퀴즈 채점 (위임)
  panelEl.addEventListener("click", (e) => {
    const opt = e.target.closest(".quiz-opt");
    if (!opt) return;
    const opts = opt.closest(".quiz-opts");
    if (opt.disabled) return;
    const answer = +opts.dataset.answer;
    const chosen = +opt.dataset.oi;
    opts.querySelectorAll(".quiz-opt").forEach((b) => {
      b.disabled = true;
      const oi = +b.dataset.oi;
      if (oi === answer) b.classList.add("quiz-opt--correct");
      if (oi === chosen && chosen !== answer) b.classList.add("quiz-opt--wrong");
    });
    const ex = opts.parentElement.querySelector(".quiz-explain");
    if (ex) ex.classList.add("open");
  });

  // 푸터
  document.getElementById("foot").innerHTML = `
    <footer class="lens__footer">
      <p>📚 <b>깊이 읽기</b> — 어려운 문서를 5가지 렌즈로 다시 읽는 학습 페이지. 원문을 대체하지 않으며, 정확한 내용은 출처를 확인하세요.</p>
      <p>Folio 디자인 시스템 기반 · 단일 HTML(외부 의존성 없음, 폰트 CDN 제외) · 학습 템플릿: doc-lenses 각색</p>
    </footer>`;
})();

/* 테마 — 기본 시스템 따름, 클릭 시 고정 */
(function () {
  const root = document.documentElement, body = document.body;
  const btn = document.getElementById("themeBtn");
  const mq = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
  const saved = () => { try { return localStorage.getItem("nl-theme"); } catch (e) { return null; } };
  const dark = () => { const s = saved(); return s === "dark" ? true : s === "light" ? false : (mq ? mq.matches : false); };
  const apply = () => body.classList.toggle("fl-dark", dark());
  btn.addEventListener("click", () => { const n = dark() ? "light" : "dark"; try { localStorage.setItem("nl-theme", n); } catch (e) {} root.dataset.nlTheme = n; apply(); });
  if (mq) mq.addEventListener("change", () => { if (!saved()) apply(); });
  apply();
})();
</script>
