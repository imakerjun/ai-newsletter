/* Folio 토큰 서브셋 — 저장소 전체와 동일한 디자인 언어 */
.folio, .folio * { box-sizing: border-box; }
.folio {

.topnav__spacer { flex: 1; }
.topnav__link { display: inline-flex; align-items: center; gap: 6px; padding: 6px 11px; border-radius: var(--fl-radius-md); font-size: 13px; font-weight: 500; color: var(--fl-text-secondary); transition: background var(--fl-dur-fast), color var(--fl-dur-fast); }

.topnav__link--active { background: var(--fl-active); color: var(--fl-text); }

.nl-theme { width: 34px; height: 34px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; background: transparent; border: 1px solid var(--fl-border); border-radius: var(--fl-radius-md); color: var(--fl-text-secondary); cursor: pointer; transition: background var(--fl-dur-fast), color var(--fl-dur-fast); }

.nl-theme svg { width: 17px; height: 17px; }
.nl-ico-sun, .nl-ico-moon { display: none; }
body:not(.fl-dark) .nl-ico-sun { display: block; }
body.fl-dark .nl-ico-moon { display: block; }

.lens { max-width: 760px; margin: 0 auto; padding: 28px 28px 120px; }

/* 헤더 */
.lens__icon { font-size: 52px; line-height: 1; }
.lens__eyebrow { margin-top: 14px; display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; color: var(--fl-tint-purple); background: var(--fl-tint-purple-bg); padding: 3px 10px; border-radius: 999px; }
.lens__title { font-size: 34px; font-weight: 800; line-height: 1.18; letter-spacing: -0.02em; margin: 14px 0 0; word-break: keep-all; }
.lens__oneliner { font-size: 16px; line-height: 1.65; color: var(--fl-text-secondary); margin: 12px 0 0; max-width: 60ch; word-break: keep-all; }
.lens__source { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 6px 16px; align-items: center; font-size: 12.5px; color: var(--fl-text-tertiary); padding-bottom: 18px; border-bottom: 1px solid var(--fl-border-subtle); }
.lens__source a { color: var(--fl-text-link); border-bottom: 1px dashed var(--fl-border); padding-bottom: 1px; }
.lens__source a:hover { border-bottom-color: var(--fl-text-link); }

/* 렌즈 탭 */
.lens-tabs { position: sticky; top: 44px; z-index: 20; display: flex; flex-wrap: wrap; gap: 6px; margin-top: 22px; padding: 12px 0; background: var(--fl-bg); border-bottom: 1px solid var(--fl-border-subtle); }
.lens-tab { display: inline-flex; align-items: center; gap: 6px; font-family: inherit; font-size: 13px; font-weight: 500; color: var(--fl-text-secondary); background: var(--fl-surface); border: 1px solid var(--fl-border); border-radius: var(--fl-radius-md); padding: 7px 13px; cursor: pointer; white-space: nowrap; transition: background var(--fl-dur-fast), color var(--fl-dur-fast), border-color var(--fl-dur-fast); }
.lens-tab:hover { background: var(--fl-hover); color: var(--fl-text); }
.lens-tab[aria-selected="true"] { background: var(--fl-text); color: var(--fl-bg); border-color: var(--fl-text); font-weight: 600; }

/* 렌즈 본문 */
@keyframes lens-fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.lens-panel { animation: lens-fade 0.3s var(--fl-ease-out); padding-top: 26px; }
.lens-panel__hint { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 18px; padding: 11px 14px; background: var(--fl-surface-2); border-radius: var(--fl-radius-md); font-size: 13px; color: var(--fl-text-secondary); line-height: 1.6; }
.lens-panel__hint b { color: var(--fl-text); }

/* prose */
.lens-prose { font-size: 15px; line-height: 1.75; color: var(--fl-text); word-break: keep-all; }
.lens-prose h3 { font-size: 18px; font-weight: 700; margin: 26px 0 10px; letter-spacing: -0.01em; }
.lens-prose h3:first-child { margin-top: 0; }
.lens-prose p { margin: 0 0 14px; color: var(--fl-text-secondary); }
.lens-prose strong { color: var(--fl-text); font-weight: 700; }
.lens-prose ul { margin: 0 0 14px; padding-left: 20px; color: var(--fl-text-secondary); }
.lens-prose li { margin: 0 0 7px; }
.lens-prose code { font-family: var(--fl-font-mono); font-size: 0.9em; background: var(--fl-surface-3); padding: 1px 5px; border-radius: 4px; color: var(--fl-text); }
.lens-prose .callout { display: flex; gap: 12px; padding: 14px 16px; border-radius: var(--fl-radius-md); background: var(--fl-tint-purple-bg); margin: 0 0 16px; line-height: 1.6; }
.lens-prose .callout__i { font-size: 18px; flex-shrink: 0; }
.lens-prose .callout p { margin: 0; color: var(--fl-text); }
.lens-prose .etymo { display: flex; flex-wrap: wrap; gap: 8px; align-items: baseline; padding: 12px 14px; border-left: 3px solid var(--fl-tint-purple); background: var(--fl-surface-2); border-radius: 0 var(--fl-radius) var(--fl-radius) 0; margin: 0 0 12px; }
.lens-prose .etymo b { font-size: 15px; }
.lens-prose .etymo span { color: var(--fl-text-tertiary); font-size: 13.5px; }

/* 전문 번역 — 프롬프트(한국어 번역 + 접이식 영어 원문) */
.lens-prose .tp { margin: 0 0 16px; padding: 12px 14px; border-left: 3px solid var(--fl-tint-blue); background: var(--fl-surface-2); border-radius: 0 var(--fl-radius) var(--fl-radius) 0; }
.lens-prose .tp > p { margin: 0; color: var(--fl-text); }
.lens-prose details { margin: 8px 0 0; }
.lens-prose summary { cursor: pointer; font-size: 12.5px; font-weight: 600; color: var(--fl-text-tertiary); padding: 4px 0; list-style: none; }
.lens-prose summary::-webkit-details-marker { display: none; }
.lens-prose summary::before { content: "▸ "; }
.lens-prose details[open] summary::before { content: "▾ "; }
.lens-prose pre { margin: 8px 0 0; padding: 12px 14px; background: var(--fl-surface-3); border: 1px solid var(--fl-border-subtle); border-radius: var(--fl-radius); overflow-x: auto; font-family: var(--fl-font-mono); font-size: 12px; line-height: 1.6; color: var(--fl-text); white-space: pre-wrap; word-break: break-word; }
.lens-prose .src-note { display: flex; gap: 10px; padding: 12px 14px; background: var(--fl-tint-blue-bg); border-radius: var(--fl-radius-md); margin: 0 0 18px; font-size: 13px; line-height: 1.6; }
.lens-prose .src-note a { color: var(--fl-text-link); font-weight: 600; }

/* quiz */
.quiz-item { border: 1px solid var(--fl-border-subtle); border-radius: var(--fl-radius-lg); padding: 18px 20px; margin-bottom: 14px; background: var(--fl-surface); }
.quiz-q { font-size: 15px; font-weight: 700; margin: 0 0 14px; line-height: 1.5; }
.quiz-q span { color: var(--fl-tint-purple); margin-right: 6px; }
.quiz-opts { display: grid; gap: 8px; }
.quiz-opt { display: flex; align-items: flex-start; gap: 9px; text-align: left; font-family: inherit; font-size: 14px; line-height: 1.5; color: var(--fl-text); background: var(--fl-surface); border: 1px solid var(--fl-border); border-radius: var(--fl-radius-md); padding: 10px 13px; cursor: pointer; transition: background var(--fl-dur-fast), border-color var(--fl-dur-fast); }
.quiz-opt:hover:not(:disabled) { background: var(--fl-hover); }
.quiz-opt__mark { flex-shrink: 0; font-weight: 700; color: var(--fl-text-tertiary); }
.quiz-opt--correct { background: var(--fl-tint-green-bg); border-color: var(--fl-success); }
.quiz-opt--correct .quiz-opt__mark { color: var(--fl-success); }
.quiz-opt--wrong { background: var(--fl-danger-bg); border-color: var(--fl-danger); }
.quiz-opt--wrong .quiz-opt__mark { color: var(--fl-danger); }
.quiz-opt:disabled { cursor: default; }
.quiz-explain { display: none; margin-top: 12px; padding: 11px 14px; background: var(--fl-surface-2); border-radius: var(--fl-radius); font-size: 13.5px; line-height: 1.65; color: var(--fl-text-secondary); }
.quiz-explain.open { display: block; }
.quiz-explain b { color: var(--fl-text); }

.lens__footer { margin-top: 48px; padding-top: 22px; border-top: 1px solid var(--fl-border-subtle); color: var(--fl-text-tertiary); font-size: 12.5px; line-height: 1.7; }
.lens__footer b { color: var(--fl-text-secondary); }

@media (prefers-reduced-motion: reduce) { .lens-panel { animation: none; } body { transition: none; } }
@media (max-width: 640px) {
  .lens { padding: 20px 16px 96px; }
  .topnav { padding: 8px 14px; gap: 8px; }
  .topnav__brand-t { display: none; }
  .lens__title { font-size: 26px; }
  .lens-tabs { flex-wrap: nowrap; overflow-x: auto; margin: 22px -16px 0; padding: 11px 16px; scrollbar-width: none; }
  .lens-tabs::-webkit-scrollbar { display: none; }
  .lens-tab { flex: 0 0 auto; }
}
</style>

<script>
/* ============================================================================
   렌즈 문서 데이터 — 어려운 원문 1개를 5가지 렌즈로 재구성.
   이 객체만 교체하면 새 학습 문서가 됩니다. (kind: prose | quiz)
   ============================================================================ */
const LENS_DOC = {
  meta: {
    icon: "🛡️",
    title: "거부와 폴백(Refusals & Fallback)",
    oneliner: "안전 분류기가 요청을 거부할 때 다른 모델로 자동 재시도하는 법을 5가지 렌즈로 다시 읽습니다.",
    sourceTitle: "Anthropic 공식문서",
    sourceUrl: "https://platform.claude.com/docs/ko/build-with-claude/refusals-and-fallback",
    fetched: "2026-05-29 기준",
    tags: ["거부", "폴백", "공식문서"]
  },
  lenses: [
    {
      id: "etymology", icon: "🔤", label: "어원", kind: "prose",
      hint: "낯선 용어가 <b>어디서 왔는지</b>부터 풀면 개념이 친숙해집니다. (학습용 해석)",
      body: `
        <h3>‘refusal’ — 라틴어 <code>refundere</code>(되돌려 붓다)에서</h3>
        <div class="etymo"><b>refuse</b><span>← 라틴어 <code>refundere</code> ‘다시 부어 돌려보내다’ ← <code>re-</code>(되) + <code>fundere</code>(붓다)</span></div>
        <p>영어 <strong>refuse</strong>(거절하다)는 ‘받은 것을 도로 되돌려 보낸다’는 이미지에서 왔습니다. 안전 분류기가 요청을 받아들이지 않고 <strong>되돌려 보내는</strong> 동작과 잘 어울리는 어원이에요.</p>
        <h3>‘fallback’ — ‘뒤로 물러서다’에서 ‘대비책’으로</h3>
        <div class="etymo"><b>fallback</b><span>fall(떨어지다) + back(뒤로) → ‘뒤로 물러설 자리’ → 일이 막혔을 때 기대는 ‘대안·예비책’</span></div>
        <p>군대가 진격이 막히면 미리 정해둔 곳으로 ‘물러난다(fall back)’는 데서, 일이 안 될 때 기대는 <strong>예비 수단</strong>이라는 뜻이 되었습니다. 거부된 요청을 받아주는 <strong>다른 모델</strong>이 바로 그 대비책입니다.</p>
        <div class="callout"><span class="callout__i">💡</span><p>그래서 이 문서는 한 문장으로 요약됩니다. <strong>“문이 막히면(refusal), 미리 정해둔 다른 길(fallback)로 돌아간다.”</strong></p></div>
        <h3>곁들이면 좋은 용어 어원</h3>
        <div class="etymo"><b>classifier</b><span>← 라틴어 <code>classis</code>(무리·등급) → ‘무리로 나누는 것’. 요청을 위험/안전 등급으로 가르는 판별기.</span></div>
        <div class="etymo"><b>sticky</b><span>‘끈끈한·달라붙는’ → 한 번 폴백된 대화가 같은 모델에 ‘붙어’ 이어지는 라우팅을 <code>sticky routing</code>이라 부릅니다.</span></div>
        <div class="etymo"><b>credit</b><span>← 라틴어 <code>credere</code>(믿다·맡기다) → ‘되돌려 받을 몫’. 재시도 비용을 환불해주는 <code>fallback credit</code>.</span></div>
        <p style="color:var(--fl-text-tertiary);font-size:13px">※ 어원 해석은 이해를 돕기 위한 학습용 연결이며, 공식 작명 의도와 다를 수 있습니다.</p>
      `
    },
    {
      id: "tldr", icon: "⚡", label: "한입요약", kind: "prose",
      hint: "30초 안에 핵심만. 자세한 근거는 다른 렌즈와 <b>원문</b>에서.",
      body: `
        <h3>핵심 6줄</h3>
        <ul>

          <li><code>fallback</code> 콘텐츠 블록이 한 모델 출력에서 다음 모델로 넘어가는 지점마다 표시됩니다: <code>{"type":"fallback","from":{...},"to":{...}}</code>. <code>from.model</code>은 사용자가 보낸 모델 문자열, <code>to.model</code>은 계속 진행하는 모델의 확인된 ID입니다.</li>
        </ul>
        <div class="tp"><p>출력 시작 전 거부 후 폴백이 응답한 예 — 첫 블록이 <code>fallback</code>이고, <code>usage.iterations</code>가 모든 시도를 기록합니다.
        <details><summary>응답 원문(JSON) — 복사용</summary><pre>{
  "model": "claude-opus-4-8",
  "content": [
    { "type": "fallback",
      "from": { "model": "claude-fable-5" },
      "to": { "model": "claude-opus-4-8" } },
    { "type": "text", "text": "Hi! How can I help you today?" }
  ],
  "stop_reason": "end_turn",
  "stop_details": null,
  "usage": {
    "input_tokens": 412, "output_tokens": 264,
    "iterations": [
      { "type": "message", "model": "claude-fable-5", "output_tokens": 0 },
      { "type": "fallback_message", "model": "claude-opus-4-8", "output_tokens": 264 }
    ]
  }
}</pre></details></p></div>
        <p><code>usage.iterations</code> 배열은 모든 시도를 기록합니다. 거부한 모델은 일반 <code>message</code> 항목으로, 그 턴을 처리한 모델은 <code>fallback_message</code> 항목으로 나타납니다. 체인의 모든 모델이 거부하면 응답은 마지막 모델의 거부가 됩니다.</p>

        <h3>대화 계속하기</h3>
        <p>다음 턴에서는 받은 그대로 어시스턴트 콘텐츠를 다시 보냅니다. 출력 중간 폴백 이후에는 핸드오프 전에 거부한 모델이 만든 블록이 섞일 수 있어, 유지·삭제 규칙이 있습니다.</p>
        <ul>
          <li><strong><code>fallback</code> 블록</strong> — 나타난 위치에 정확히 유지합니다. API가 이 위치로 주변 thinking 블록을 검증하므로 생략·이동 시 요청이 거부됩니다.</li>
          <li><strong><code>text</code> 블록</strong> — 유지합니다.</li>
          <li><strong>마지막 <code>fallback</code> 이후 모든 블록</strong> — 유지합니다.</li>
          <li><strong>마지막 <code>fallback</code> 이전의 <code>thinking</code>·<code>redacted_thinking</code>·<code>connector_text</code></strong> — 삭제합니다.</li>
          <li><strong>마지막 <code>fallback</code> 이전의 클라이언트 측 <code>tool_use</code></strong> — 삭제합니다.</li>
          <li><strong>마지막 <code>fallback</code> 이전의 <code>server_tool_use</code></strong> — 결과와 쌍이면 유지, 짝이 없으면 삭제합니다.</li>
        </ul>

        <h3>스트리밍과 비스트리밍</h3>
        <p>스트리밍에서는 재시도가 같은 스트림에서 일어나며 이미 받은 내용은 무효화되지 않습니다. 출력 시작 전 거부면 <code>message_start</code>가 폴백 모델을 지정하고 <code>fallback</code>이 첫 블록입니다. 출력 중간 거부면 열린 블록이 닫히고 <code>fallback</code>(델타 없는 시작·종료 쌍)이 경계를 표시하며, 부분 출력의 <code>text</code> 블록만 폴백 모델에 컨텍스트로 전달됩니다.</p>
        <p>비스트리밍에서는 출력 중간 거부가 다르게 동작합니다. 거부한 모델의 부분 출력을 생략하고 폴백 모델이 처음부터 답변하므로, 결과는 출력 시작 전 거부처럼 보입니다. 거부된 시도와 그 토큰은 여전히 <code>usage.iterations</code>에 남습니다.</p>
        <div class="callout"><span class="callout__i">⚠️</span><p><strong>서버 도구 실행 후 거부:</strong> 요청 안에서 서버 도구(웹 검색·코드 실행 등)가 이미 실행된 뒤 거부되면, API는 폴백으로 진행하지 않고 거부를 반환합니다. <code>fallback-credit-2026-06-01</code> 헤더도 설정되어 있으면 부분 응답을 이어 쓸 수 있는 크레딧 토큰이 포함되어 완료된 도구 작업이 손실되지 않습니다.</p></div>

        <h3>스티키 라우팅</h3>
        <p>대화가 폴백된 뒤 API는 어떤 모델이 처리했는지 기록합니다. 이후 같은 대화에서 <code>fallbacks</code>를 포함한 요청은 요청된 모델을 거치지 않고 그 폴백 모델로 바로 갑니다. 매 턴마다 또 거부될 시도 비용을 아끼기 위함입니다.</p>
        <ul>
          <li>약 1시간 유지되며 조직 범위로 한정됩니다.</li>
          <li>대화 접두사의 콘텐츠 해시와 처리 모델로 저장됩니다(메시지 콘텐츠 자체는 저장 안 함).</li>
          <li>최선의 노력 방식이라, 코드는 언제든 요청된 모델이 다시 시도되는 상황을 처리해야 합니다.</li>
          <li>현재 릴리스에서는 비스트리밍 요청에만 적용됩니다(스트리밍 폴백은 이후 비스트리밍 턴을 위해 결정을 기록).</li>
        </ul>

        <h3>서버 측 폴백의 과금</h3>
        <p>실제로 요청을 처리한 모델에 대해 비용을 지불합니다. 출력 생성 전 거부한 시도는 비용·속도 제한 모두 들지 않습니다. 각 시도는 그 모델의 요율로 별도 과금되며, <code>usage.iterations</code>가 시도별 기록입니다. 최상위 <code>usage</code> 수치는 반환된 메시지를 만든 시도만 설명하며 서로 다른 모델의 토큰을 합산하지 않습니다.</p>
        <p>폴백 모델이 속도 제한·과부하면 폴백 시도가 건너뛰어지고 이전 거부가 대신 반환됩니다. 예상 거부 볼륨에 맞게 폴백 모델 속도 제한을 설정하세요. 이렇게 건너뛰어지면 <code>stop_details.recommended_model</code>이 직접 재시도할 모델을 힌트로 제시합니다(보장 아님, 없으면 <code>null</code>).</p>

        <h3>SDK 미들웨어를 사용한 클라이언트 측 폴백</h3>
        <p>TypeScript·Python·Go·Java·C# SDK에는 거부-폴백 미들웨어가 있습니다. 폴백 모델 목록과 함께 클라이언트에서 한 번 구성하면 <code>client.beta.messages</code> 호출이 모든 플랫폼에서 거부를 자동 재시도합니다. 미들웨어는 처리하는 모든 요청에 <code>fallback-credit-2026-06-01</code> 베타 헤더를 보내 재가격을 적용합니다. (Ruby·PHP SDK에는 아직 헬퍼가 없어 직접 구현이 필요합니다.)</p>
        <div class="tp"><p>TypeScript 설정 — 미들웨어를 생성자에 넘기고, 대화의 요청 간에 하나의 <code>BetaFallbackState</code>를 공유합니다.
        <details><summary>코드 원문(영어) — 복사용</summary><pre>import { BetaFallbackState, betaRefusalFallbackMiddleware } from "@anthropic-ai/sdk";

const client = new Anthropic({
  middleware: [betaRefusalFallbackMiddleware([{ model: "claude-opus-4-8" }])]
});

// share one state across the conversation so follow-ups
// stay pinned to the model that accepted
const fallbackState = new BetaFallbackState();

const message = await client.beta.messages.create(
  { model: "claude-fable-5", max_tokens: 1024,
    messages: [{ role: "user", content: "Hello, Claude" }] },
  { fallbackState }
);
console.log("served by:", message.model);</pre></details></p></div>
        <p>미들웨어 동작은 다음과 같습니다.</p>
        <ul>
          <li>재시도는 폴백 목록을 순서대로 진행하며, 스스로 거부하는 폴백 모델은 다음 항목으로 넘깁니다.</li>
          <li>모든 모델이 거부했을 때만 원래 거부 응답이 반환되며, 미들웨어는 이에 대해 오류를 던지지 않습니다.</li>
          <li>Claude Fable 5의 thinking 블록은 자동 처리됩니다(재시도에서 제거하고 이후 요청의 대화 기록에서 관리).</li>
          <li>응답은 서버 측 폴백과 동일하게 모델 경계마다 <code>fallback</code> 블록을 포함하며, 이후 요청에서 미들웨어가 자동 관리합니다.</li>
          <li>수락한 모델은 <code>BetaFallbackState</code>에 기록되어, 상태를 공유하는 후속 요청이 그 모델에 고정됩니다.</li>
        </ul>
        <p>미들웨어와 서버 측 <code>fallbacks</code>는 같은 일을 하므로 한 요청에 둘 다 구성하지 마세요. 미들웨어를 설치한 앱에서 서버 측 <code>fallbacks</code>를 보내려면 미들웨어 없는 별도 클라이언트를 쓰세요.</p>

        <h3>재시도를 직접 작성하기</h3>
        <p>Ruby·PHP·원시 HTTP에서는 미들웨어가 감싸는 패턴을 직접 구현합니다.</p>
        <ul>
          <li><strong>거부 감지</strong> — 응답에서 <code>stop_reason: "refusal"</code>을 확인합니다.</li>
          <li><strong>폴백 모델로 다시 보내기</strong> — <code>model</code>을 Claude Opus 4.8 같은 폴백 모델로 바꿔 같은 요청을 보냅니다. 크레딧을 안 쓰면 먼저 thinking 블록을 제거할 수 있고(다른 모델은 무시), 크레딧을 쓰면 정확한 일치가 필요하므로 본문을 바꾸지 않고 보냅니다.</li>
          <li><strong>폴백 모델 유지</strong> — 멀티턴이면 다시 전환하지 말고 후속 턴에서도 폴백 모델을 계속 씁니다.</li>
        </ul>
        <p>수동 재시도는 폴백 모델의 프롬프트 캐시를 처음부터 작성하므로 기존 캐시 읽기보다 비쌉니다. 폴백 크레딧이 그 비용을 환불하니, 직접 구축하는 모든 재시도에서 사용하세요.</p>

        <h3>Message Batches의 거부</h3>
        <p>Message Batch에서 거부된 요청은 <code>result.type: "succeeded"</code>와 함께 <code>stop_reason: "refusal"</code>로 반환됩니다. 배치 결과의 <code>stop_details</code>는 <code>null</code>일 수 있으니 <code>stop_reason</code>을 직접 확인해 거부를 감지하세요. 서버 측 폴백은 배치에서 쓸 수 없습니다. 재시도하려면 (1) 거부 항목 수집 → (2) 멀티턴 기록에서 Fable 5의 thinking 블록 제거 → (3) 새 배치나 직접 요청으로 폴백 모델에 다시 제출합니다.</p>

        <h3>일반적인 함정</h3>
        <ul>
          <li><strong>다른 모델에서 재시도하세요.</strong> 같은 모델로 다시 보내면 보통 또 거부됩니다.</li>
          <li><strong>재시도 예산은 턴·세션이 아닌 요청별로.</strong> 단일 턴(에이전트 + 하위 에이전트)이 여러 거부를 낼 수 있습니다.</li>
          <li><strong>모든 요청 경로에 폴백을.</strong> 재시도 핸들러·오류 복구 분기·백그라운드 워커 모두 필요합니다.</li>
          <li><strong>하위 에이전트 호출에 자체 폴백을.</strong> <code>fallbacks</code> 매개변수는 도구 실행 내부의 모델 호출로 전파되지 않습니다.</li>
          <li><strong>폴백은 주변 상태가 아닌 요청의 속성으로.</strong> 공유 플래그·전역 토글은 동기화가 어긋날 수 있습니다. 확신이 없으면 활성화돼 있다고 가정하지 말고 구성하세요.</li>
          <li><strong>거부를 자체 신호로 계측하세요.</strong> 거부는 HTTP 200이라 5xx 기반 모니터링으로는 안 잡힙니다. 거부당 1이벤트, 폴백 처리당 1이벤트(<code>usage.iterations</code>의 <code>fallback_message</code>)를 내보내고 둘의 차이에 알림을 거세요.</li>
          <li><strong><code>stop_reason</code>으로 분기하세요.</strong> <code>stop_details</code>·<code>content</code>가 아니라 <code>stop_reason === "refusal"</code>로 판단합니다.</li>
        </ul>

      `
    }
  ]

  const saved = () => { try { return localStorage.getItem("nl-theme"); } catch (e) { return null; } };
  const dark = () => { const s = saved(); return s === "dark" ? true : s === "light" ? false : (mq ? mq.matches : false); };
  const apply = () => body.classList.toggle("fl-dark", dark());
  btn.addEventListener("click", () => { const n = dark() ? "light" : "dark"; try { localStorage.setItem("nl-theme", n); } catch (e) {} root.dataset.nlTheme = n; apply(); });
  if (mq) mq.addEventListener("change", () => { if (!saved()) apply(); });
  apply();
})();
</script>
</body>
</html>
