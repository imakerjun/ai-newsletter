.lens { max-width: 760px; margin: 0 auto; padding: 28px 28px 120px; }

/* 헤더 */
.lens__icon { font-size: 52px; line-height: 1; }
.lens__eyebrow { margin-top: 14px; display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; color: var(--fl-tint-purple); background: var(--fl-tint-purple-bg); padding: 3px 10px; border-radius: 999px; }
.lens__title { font-size: 34px; font-weight: 800; line-height: 1.18; letter-spacing: -0.02em; margin: 14px 0 0; word-break: keep-all; }

.lens__source { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 6px 16px; align-items: center; font-size: 12.5px; color: var(--fl-text-tertiary); padding-bottom: 18px; border-bottom: 1px solid var(--fl-border-subtle); }
.lens__source a { color: var(--fl-text-link); border-bottom: 1px dashed var(--fl-border); padding-bottom: 1px; }

/* 렌즈 탭 */
.lens-tabs { position: sticky; top: 44px; z-index: 20; display: flex; flex-wrap: wrap; gap: 6px; margin-top: 22px; padding: 12px 0; background: var(--fl-bg); border-bottom: 1px solid var(--fl-border-subtle); }
.lens-tab { display: inline-flex; align-items: center; gap: 6px; font-family: inherit; font-size: 13px; font-weight: 500; color: var(--fl-text-secondary); background: var(--fl-surface); border: 1px solid var(--fl-border); border-radius: var(--fl-radius-md); padding: 7px 13px; cursor: pointer; white-space: nowrap; transition: background var(--fl-dur-fast), color var(--fl-dur-fast), border-color var(--fl-dur-fast); }
.lens-tab:hover { background: var(--fl-hover); color: var(--fl-text); }
.lens-tab[aria-selected="true"] { background: var(--fl-text); color: var(--fl-bg); border-color: var(--fl-text); font-weight: 600; }

/* 렌즈 본문 */
@keyframes lens-fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.lens-panel { animation: lens-fade 0.3s var(--fl-ease-out); padding-top: 26px; }
.lens-panel__hint { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 18px; padding: 11px 14px; background: var(--fl-surface-2); border-radius: var(--fl-radius-md); font-size: 13px; color: var(--fl-text-secondary); line-height: 1.6; }

.lens-prose { font-size: 15px; line-height: 1.75; color: var(--fl-text); word-break: keep-all; }
.lens-prose h3 { font-size: 18px; font-weight: 700; margin: 26px 0 10px; letter-spacing: -0.01em; }

.lens-prose strong { color: var(--fl-text); font-weight: 700; }
.lens-prose ul { margin: 0 0 14px; padding-left: 20px; color: var(--fl-text-secondary); }
.lens-prose li { margin: 0 0 7px; }
.lens-prose code { font-family: var(--fl-font-mono); font-size: 0.9em; background: var(--fl-surface-3); padding: 1px 5px; border-radius: 4px; color: var(--fl-text); }
.lens-prose .callout { display: flex; gap: 12px; padding: 14px 16px; border-radius: var(--fl-radius-md); background: var(--fl-tint-purple-bg); margin: 0 0 16px; line-height: 1.6; }
.lens-prose .callout__i { font-size: 18px; flex-shrink: 0; }
.lens-prose .callout p { margin: 0; color: var(--fl-text); }
.lens-prose .etymo { display: flex; flex-wrap: wrap; gap: 8px; align-items: baseline; padding: 12px 14px; border-left: 3px solid var(--fl-tint-purple); background: var(--fl-surface-2); border-radius: 0 var(--fl-radius) var(--fl-radius) 0; margin: 0 0 12px; }
.lens-prose .etymo b { font-size: 15px; }
.lens-prose .etymo span { color: var(--fl-text-tertiary); font-size: 13.5px; }

.lens-prose .tp { margin: 0 0 16px; padding: 12px 14px; border-left: 3px solid var(--fl-tint-blue); background: var(--fl-surface-2); border-radius: 0 var(--fl-radius) var(--fl-radius) 0; }
.lens-prose .tp > p { margin: 0; color: var(--fl-text); }
.lens-prose details { margin: 8px 0 0; }
.lens-prose summary { cursor: pointer; font-size: 12.5px; font-weight: 600; color: var(--fl-text-tertiary); padding: 4px 0; list-style: none; }
.lens-prose summary::-webkit-details-marker { display: none; }
.lens-prose summary::before { content: "▸ "; }
.lens-prose details[open] summary::before { content: "▾ "; }
.lens-prose pre { margin: 8px 0 0; padding: 12px 14px; background: var(--fl-surface-3); border: 1px solid var(--fl-border-subtle); border-radius: var(--fl-radius); overflow-x: auto; font-family: var(--fl-font-mono); font-size: 12px; line-height: 1.6; color: var(--fl-text); white-space: pre-wrap; word-break: break-word; }
.lens-prose .src-note { display: flex; gap: 10px; padding: 12px 14px; background: var(--fl-tint-blue-bg); border-radius: var(--fl-radius-md); margin: 0 0 18px; font-size: 13px; line-height: 1.6; }
.lens-prose .src-note a { color: var(--fl-text-link); font-weight: 600; }

/* quiz */
.quiz-item { border: 1px solid var(--fl-border-subtle); border-radius: var(--fl-radius-lg); padding: 18px 20px; margin-bottom: 14px; background: var(--fl-surface); }
.quiz-q { font-size: 15px; font-weight: 700; margin: 0 0 14px; line-height: 1.5; }
.quiz-q span { color: var(--fl-tint-purple); margin-right: 6px; }
.quiz-opts { display: grid; gap: 8px; }
.quiz-opt { display: flex; align-items: flex-start; gap: 9px; text-align: left; font-family: inherit; font-size: 14px; line-height: 1.5; color: var(--fl-text); background: var(--fl-surface); border: 1px solid var(--fl-border); border-radius: var(--fl-radius-md); padding: 10px 13px; cursor: pointer; transition: background var(--fl-dur-fast), border-color var(--fl-dur-fast); }
.quiz-opt:hover:not(:disabled) { background: var(--fl-hover); }
.quiz-opt__mark { flex-shrink: 0; font-weight: 700; color: var(--fl-text-tertiary); }
.quiz-opt--correct { background: var(--fl-tint-green-bg); border-color: var(--fl-success); }
.quiz-opt--correct .quiz-opt__mark { color: var(--fl-success); }
.quiz-opt--wrong { background: var(--fl-danger-bg); border-color: var(--fl-danger); }
.quiz-opt--wrong .quiz-opt__mark { color: var(--fl-danger); }
.quiz-opt:disabled { cursor: default; }
.quiz-explain { display: none; margin-top: 12px; padding: 11px 14px; background: var(--fl-surface-2); border-radius: var(--fl-radius); font-size: 13.5px; line-height: 1.65; color: var(--fl-text-secondary); }
.quiz-explain.open { display: block; }
.quiz-explain b { color: var(--fl-text); }

.lens__footer { margin-top: 48px; padding-top: 22px; border-top: 1px solid var(--fl-border-subtle); color: var(--fl-text-tertiary); font-size: 12.5px; line-height: 1.7; }

@media (prefers-reduced-motion: reduce) { .lens-panel { animation: none; } body { transition: none; } }
@media (max-width: 640px) {

}

<script>
/* ============================================================================
   렌즈 문서 데이터 — 어려운 원문 1개를 5가지 렌즈로 재구성.
   이 객체만 교체하면 새 학습 문서가 됩니다. (kind: prose | quiz)
   ============================================================================ */
const LENS_DOC = {
  meta: {
    icon: "⚡",
    title: "프롬프트 캐싱(Prompt Caching)",
    oneliner: "반복되는 프롬프트 앞부분을 재사용해 비용과 지연을 크게 줄이는 Claude API 기능을 5가지 렌즈로 다시 읽습니다.",
    sourceTitle: "Anthropic 공식문서",
    sourceUrl: "https://platform.claude.com/docs/ko/build-with-claude/prompt-caching",
    fetched: "2026-06-05 기준",
    tags: ["프롬프트 캐싱", "비용 절감", "공식문서"]
  },
  lenses: [
    {
      id: "etymology", icon: "🔤", label: "어원", kind: "prose",
      hint: "낯선 용어가 <b>어디서 왔는지</b>부터 풀면 개념이 친숙해집니다. (학습용 해석)",
      body: `
        <h3>‘cache’ — 프랑스어 <code>cacher</code>(숨기다)에서</h3>
        <div class="etymo"><b>cache</b><span>← 프랑스어 <code>cacher</code> ‘숨기다·감추다’ → ‘남이 못 찾게 따로 보관해 둔 곳’</span></div>
        <p>원래 <strong>cache</strong>는 사냥꾼이나 탐험가가 물자를 ‘숨겨둔 저장처’를 뜻했습니다. 컴퓨터에서는 ‘<strong>한 번 계산하거나 가져온 것을 가까운 곳에 따로 두었다가 다시 꺼내 쓰는 빠른 저장 공간</strong>’이라는 의미로 쓰입니다. 프롬프트 캐싱도 같은 발상이에요 — 프롬프트의 앞부분을 처리해 둔 결과를 잠시 보관했다가, 다음 요청에서 그대로 ‘꺼내’ 씁니다.</p>
        <div class="callout"><span class="callout__i">💡</span><p>발음은 ‘캐시(cash, 현금)’와 같지만 어원은 전혀 다릅니다. 헷갈리지 마세요 — 캐싱의 cache는 ‘숨겨둔 보관처’라는 뜻입니다.</p></div>
        <h3>곁들이면 좋은 용어 어원</h3>
        <div class="etymo"><b>prefix</b><span>← 라틴어 <code>prae-</code>(앞에)+<code>fixus</code>(고정된) → ‘앞에 붙은 부분’. 캐싱은 프롬프트의 ‘앞부분(접두사)’ 단위로 동작합니다.</span></div>
        <div class="etymo"><b>ephemeral</b><span>← 그리스어 <code>ephēmeros</code> ‘하루살이의·잠깐 사는’. 캐시 타입 <code>ephemeral</code>은 ‘오래 못 가는, 일시적인’ 저장임을 뜻합니다.</span></div>
        <div class="etymo"><b>TTL</b><span>Time To Live(살아 있는 시간)의 약자 — 캐시가 자동으로 사라지기까지의 수명(5분 또는 1시간).</span></div>
        <p style="color:var(--fl-text-tertiary);font-size:13px">※ 어원 해석은 이해를 돕기 위한 학습용 연결이며, 실제 작명 의도와 다를 수 있습니다.</p>
      `
    },
    {
      id: "tldr", icon: "⚡", label: "한입요약", kind: "prose",
      hint: "30초 안에 핵심만. 자세한 근거는 다른 렌즈와 <b>원문</b>에서.",
      body: `
        <h3>핵심 7줄</h3>
        <ul>
          <li><strong>같은 앞부분을 또 보낼 때 쓰세요.</strong> 프롬프트의 변하지 않는 접두사(긴 지침, 문서, 도구 정의 등)를 캐시해 두면 다음 요청부터 그 부분을 다시 계산하지 않습니다.</li>

        <h3>성능 추적</h3>
        <p>응답의 <code>usage</code> 필드로 캐시 성능을 모니터링합니다. <code>cache_creation_input_tokens</code>는 새로 캐시된 토큰, <code>cache_read_input_tokens</code>는 캐시에서 읽은 토큰, <code>input_tokens</code>는 캐시 중단점 이후의 토큰입니다. 전체 입력 토큰은 이 세 값의 합입니다.</p>
        <div class="tp"><p>캐시 사용량을 출력하는 코드입니다.
        <details><summary>코드 원문(Python) — 복사용</summary><pre>print(response.usage.cache_creation_input_tokens)  # 새로 캐시된 토큰
print(response.usage.cache_read_input_tokens)      # 캐시에서 읽은 토큰
print(response.usage.input_tokens)                 # 캐시 중단점 이후 토큰</pre></details></p></div>

        <h3>캐시 사전 워밍(prewarming)</h3>
        <p>사용자 요청이 들어오기 전에 캐시를 미리 채워 둘 수 있습니다. <code>max_tokens: 0</code>으로 출력 없이 호출하면 기본 입력 토큰만 청구되며, 이후 실제 요청은 캐시된 프롬프트를 사용합니다. 단, <code>max_tokens: 0</code>은 스트리밍·확장 사고·구조화된 출력과 호환되지 않고 Batch API에서는 쓸 수 없습니다.</p>
        <div class="tp"><p>애플리케이션 시작 시 캐시를 예열하는 예시입니다.
        <details><summary>코드 원문(Python) — 복사용</summary><pre># 애플리케이션 시작 시 실행
prewarm = client.messages.create(
    model="claude-opus-4-8",
    max_tokens=0,  # 출력 없음
    system=[
        {
            "type": "text",
            "text": "You are an expert software engineer...",
            "cache_control": {"type": "ephemeral"},
        }
    ],
    messages=[{"role": "user", "content": "warmup"}],
)</pre></details></p></div>

        <h3>혼합 TTL</h3>
        <p>한 요청 안에 1시간 캐시와 5분 캐시를 함께 쓸 수 있습니다. 규칙은 <strong>더 긴 TTL이 먼저(앞에) 나와야 한다</strong>는 것입니다. 거의 바뀌지 않는 정적 지침은 1시간으로, 매일 바뀌는 컨텍스트는 5분으로 두는 식입니다.</p>
        <div class="tp"><p>정적 지침은 1시간, 일일 컨텍스트는 5분으로 둔 예시입니다.
        <details><summary>코드 원문(JSON) — 복사용</summary><pre>{
  "system": [
    {
      "type": "text",
      "text": "Static instructions...",
      "cache_control": {"type": "ephemeral", "ttl": "1h"}
    },
    {
      "type": "text",
      "text": "Daily context...",
      "cache_control": {"type": "ephemeral"}
    }
  ]
}</pre></details></p></div>

        <h3>모범 사례</h3>
        <ul>
          <li><strong>멀티턴 대화</strong>는 자동 캐싱을 사용합니다.</li>
          <li><strong>변경 빈도가 다른 섹션</strong>은 명시적 중단점(최대 4개)으로 나눕니다.</li>
          <li><strong>안정적인 내용을 프롬프트 시작에</strong> 배치합니다.</li>
          <li><strong>중단점은 요청 간 동일하게 유지되는 마지막 블록</strong>에 둡니다.</li>
          <li><strong>도구 정의는 마지막 도구에 중단점을 두면</strong> 모든 도구가 캐시됩니다.</li>
        </ul>

        <h3>흔한 문제 해결</h3>
        <ul>
          <li><strong>캐시 미스(콘텐츠 변경)</strong>: 캐시된 부분이 완전히 동일한지 확인합니다.</li>
          <li><strong>캐시 미스(TTL 만료)</strong>: 5분(또는 1시간) 내에 다시 요청합니다.</li>
          <li><strong>캐시 미스(최소 토큰 미달)</strong>: 캐시 구간을 모델 최소값 이상으로 키웁니다.</li>
          <li><strong>캐시 미스(타임스탬프 등 변동 값)</strong>: 정적 블록에만 중단점을 둡니다.</li>
          <li><strong>캐시 미스(20블록 초과)</strong>: 추가 중단점을 설정합니다.</li>
        </ul>

        <h3>지원 모델과 제약</h3>
        <p>자동·명시적 캐싱은 모든 활성 Claude 모델에서 지원됩니다. 단 Amazon Bedrock과 Vertex AI에서는 자동 캐싱이 지원되지 않습니다. 주요 제약: 캐시는 조직/워크스페이스 수준으로 격리되고, 프롬프트가 100% 동일해야 적중하며, 첫 응답이 시작된 후에만 캐시를 사용할 수 있고, 모델별 최소 토큰 조건을 충족해야 합니다. Zero Data Retention(ZDR) 계약이 있는 경우 캐싱을 거친 데이터도 API 응답 후 저장되지 않습니다.</p>

        <p style="color:var(--fl-text-tertiary);font-size:12.5px">※ 학습용 한국어 번역본입니다. 표현은 이해를 돕기 위해 다듬었으며, 가격·최소 토큰 등 수치는 변경될 수 있으니 정확한 내용은 출처 링크를 확인하세요.</p>
      `
    }
  ]
};

(function () {
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  const d = LENS_DOC, m = d.meta, lenses = d.lenses;

  // 헤더
  document.getElementById("head").innerHTML = `
    <div class="lens__icon">${esc(m.icon)}</div>
    <span class="lens__eyebrow">📚 깊이 읽기 · 5가지 렌즈</span>
    <h1 class="lens__title">${esc(m.title)}</h1>
    <p class="lens__oneliner">${esc(m.oneliner)}</p>
    <div class="lens__source">
      <span>📄 출처 <a href="${esc(m.sourceUrl)}" target="_blank" rel="noopener">${esc(m.sourceTitle)} ↗</a></span>
      <span>🗓️ ${esc(m.fetched)}</span>
      <span>🏷️ ${m.tags.map(esc).join(" · ")}</span>
    </div>`;

  // 탭
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = lenses.map((l, i) => `
    <button class="lens-tab" role="tab" data-i="${i}" aria-selected="${i === 0}">${esc(l.icon)} ${esc(l.label)}</button>`).join("");

  const panelEl = document.getElementById("panel");
  function renderQuiz(items) {
    return items.map((it, qi) => `
      <div class="quiz-item">
        <p class="quiz-q"><span>Q${qi + 1}.</span>${esc(it.q)}</p>
        <div class="quiz-opts" data-answer="${it.answer}">
          ${it.options.map((o, oi) => `
            <button class="quiz-opt" type="button" data-oi="${oi}">
              <span class="quiz-opt__mark">${String.fromCharCode(65 + oi)}</span><span>${esc(o)}</span>
            </button>`).join("")}
        </div>
        <div class="quiz-explain"><b>해설.</b> ${esc(it.explain)}</div>
      </div>`).join("");
  }
  function render(i) {
    const l = lenses[i];
    panelEl.innerHTML = `
      ${l.hint ? `<div class="lens-panel__hint"><span>${esc(l.icon)}</span><span>${l.hint}</span></div>` : ""}
      ${l.kind === "quiz" ? renderQuiz(l.quiz) : `<div class="lens-prose">${l.body}</div>`}`;
    panelEl.className = "lens-panel";
  }
  tabsEl.addEventListener("click", (e) => {
    const b = e.target.closest(".lens-tab");
    if (!b) return;
    const i = +b.dataset.i;
    tabsEl.querySelectorAll(".lens-tab").forEach((t) => t.setAttribute("aria-selected", String(+t.dataset.i === i)));
    render(i);
  });
  render(0);

  // 퀴즈 채점 (위임)
  panelEl.addEventListener("click", (e) => {
    const opt = e.target.closest(".quiz-opt");
    if (!opt) return;
    const opts = opt.closest(".quiz-opts");
    if (opt.disabled) return;
    const answer = +opts.dataset.answer;
    const chosen = +opt.dataset.oi;
    opts.querySelectorAll(".quiz-opt").forEach((b) => {
      b.disabled = true;
      const oi = +b.dataset.oi;
      if (oi === answer) b.classList.add("quiz-opt--correct");
      if (oi === chosen && chosen !== answer) b.classList.add("quiz-opt--wrong");
    });
    const ex = opts.parentElement.querySelector(".quiz-explain");
    if (ex) ex.classList.add("open");
  });

  // 푸터
  document.getElementById("foot").innerHTML = `
    <footer class="lens__footer">
      <p>📚 <b>깊이 읽기</b> — 어려운 문서를 5가지 렌즈로 다시 읽는 학습 페이지. 원문을 대체하지 않으며, 정확한 내용은 출처를 확인하세요.</p>
      <p>Folio 디자인 시스템 기반 · 단일 HTML(외부 의존성 없음, 폰트 CDN 제외) · 학습 템플릿: doc-lenses 각색</p>
    </footer>`;
})();

/* 테마 — 기본 시스템 따름, 클릭 시 고정 */
(function () {
  const root = document.documentElement, body = document.body;
  const btn = document.getElementById("themeBtn");
  const mq = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
  const saved = () => { try { return localStorage.getItem("nl-theme"); } catch (e) { return null; } };
  const dark = () => { const s = saved(); return s === "dark" ? true : s === "light" ? false : (mq ? mq.matches : false); };
  const apply = () => body.classList.toggle("fl-dark", dark());
  btn.addEventListener("click", () => { const n = dark() ? "light" : "dark"; try { localStorage.setItem("nl-theme", n); } catch (e) {} root.dataset.nlTheme = n; apply(); });
  if (mq) mq.addEventListener("change", () => { if (!saved()) apply(); });
  apply();
})();
</script>
