        <p>전송 계층은 통신 세부를 프로토콜 계층으로부터 추상화하므로, 어떤 전송을 쓰든 동일한 JSON-RPC 2.0 메시지 형식을 사용할 수 있습니다.</p>

        <h3>생명주기 관리</h3>
        <p>MCP는 생명주기 관리가 필요한 <strong>상태 보존(stateful) 프로토콜</strong>입니다(Streamable HTTP를 쓰면 일부는 무상태로 만들 수 있음). 생명주기 관리의 목적은 클라이언트와 서버가 모두 지원하는 <strong>역량(capabilities)</strong>을 협상하는 것입니다.</p>

        <h3>프리미티브 (Primitives)</h3>
        <p>프리미티브는 MCP에서 가장 중요한 개념으로, 클라이언트와 서버가 서로에게 무엇을 제공할 수 있는지를 정의합니다. <strong>서버가 노출하는</strong> 세 가지 핵심 프리미티브:</p>
        <ul>
          <li><strong>도구(Tools)</strong>: AI 앱이 호출해 행동을 수행하는 실행 가능한 함수(파일 작업·API 호출·DB 조회 등)</li>
          <li><strong>리소스(Resources)</strong>: AI 앱에 맥락 정보를 제공하는 데이터 소스(파일 내용·DB 레코드·API 응답 등)</li>
          <li><strong>프롬프트(Prompts)</strong>: 언어 모델과의 상호작용을 구조화하는 재사용 템플릿(시스템 프롬프트·퓨샷 예시 등)</li>
        </ul>
        <p>각 프리미티브에는 발견(<code>*/list</code>)·조회(<code>*/get</code>)·실행(<code>tools/call</code>) 메서드가 연결됩니다. 클라이언트는 <code>*/list</code>로 사용 가능한 프리미티브를 발견하므로 목록이 동적으로 변할 수 있습니다. 예를 들어 DB 컨텍스트를 제공하는 서버는 질의용 도구, 스키마를 담은 리소스, 도구 사용 예시를 담은 프롬프트를 함께 노출할 수 있습니다.</p>
        <p><strong>클라이언트가 노출하는</strong> 프리미티브도 있어 더 풍부한 상호작용을 만듭니다.</p>
        <ul>
          <li><strong>샘플링(Sampling)</strong>: 서버가 클라이언트의 AI 앱에 언어 모델 완성을 요청합니다(<code>sampling/createMessage</code>). 서버가 LLM SDK를 품지 않고도 모델에 접근하게 해줍니다.</li>
          <li><strong>입력 요청(Elicitation)</strong>: 서버가 사용자에게 추가 정보나 확인을 요청합니다(<code>elicitation/create</code>).</li>
          <li><strong>로깅(Logging)</strong>: 서버가 디버깅·모니터링을 위해 클라이언트로 로그 메시지를 보냅니다.</li>
        </ul>
        <p>그 밖에 요청 실행을 보강하는 교차 유틸리티 프리미티브로 <strong>태스크(Tasks, 실험적)</strong>가 있습니다. 결과의 지연 조회·상태 추적이 가능한 내구성 실행 래퍼로, 비용이 큰 계산·워크플로 자동화·배치·다단계 작업에 쓰입니다.</p>

        <h3>알림 (Notifications)</h3>
        <p>프로토콜은 서버와 클라이언트 사이의 동적 갱신을 위한 실시간 알림을 지원합니다. 예를 들어 서버의 도구 목록이 바뀌면, 서버는 도구 변경 알림을 보내 연결된 클라이언트에 알립니다. 알림은 응답을 기대하지 않는 JSON-RPC 2.0 알림 메시지로 전송됩니다.</p>

        <h3>예시: 초기화 (생명주기 관리)</h3>
        <p>MCP는 역량 협상 핸드셰이크로 시작합니다. 클라이언트가 <code>initialize</code> 요청을 보내 연결을 맺고 지원 기능을 협상합니다. 여기서 <code>protocolVersion</code>으로 호환 버전을 맞추고, <code>capabilities</code>로 각자 지원 기능을 선언하며, <code>clientInfo</code>/<code>serverInfo</code>로 신원을 교환합니다. 초기화가 끝나면 클라이언트가 준비 완료 알림을 보냅니다.</p>
        <div class="tp"><p>초기화 요청 — 클라이언트가 프로토콜 버전과 자신의 역량(여기서는 elicitation)을 선언합니다.
        <details><summary>코드 원문(영어) — 복사용</summary><pre>{
  "jsonrpc": "2.0",
  "id": 1,
  "method": "initialize",
  "params": {
    "protocolVersion": "2025-06-18",
    "capabilities": { "elicitation": {} },
    "clientInfo": { "name": "example-client", "version": "1.0.0" }
  }
}</pre></details></p></div>
        <div class="tp"><p>초기화 응답 — 서버가 자신의 역량을 알립니다. tools의 listChanged=true는 도구 목록 변경 알림을 보낼 수 있다는 뜻이고, resources도 지원함을 선언합니다.
        <details><summary>코드 원문(영어) — 복사용</summary><pre>{
  "jsonrpc": "2.0",
  "id": 1,
  "result": {
    "protocolVersion": "2025-06-18",
    "capabilities": {
      "tools": { "listChanged": true },
      "resources": {}
    },
    "serverInfo": { "name": "example-server", "version": "1.0.0" }
  }
}</pre></details></p></div>
        <div class="tp"><p>준비 완료 알림 — 초기화가 끝났음을 알리는, 응답이 필요 없는 알림입니다.
        <details><summary>코드 원문(영어) — 복사용</summary><pre>{
  "jsonrpc": "2.0",
  "method": "notifications/initialized"
}</pre></details></p></div>

        <h3>예시: 도구 발견과 실행</h3>
        <p>연결이 맺어지면 클라이언트는 <code>tools/list</code>로 사용 가능한 도구를 발견합니다. 각 도구에는 고유 <code>name</code>, 사람이 읽는 <code>title</code>, 설명 <code>description</code>, 입력 스키마 <code>inputSchema</code>(JSON Schema)가 담깁니다. 이후 <code>tools/call</code>로 도구를 실행하며, 응답은 다양한 형식을 담을 수 있는 <code>content</code> 배열로 돌아옵니다.</p>
        <div class="tp"><p>도구 호출 요청 — 발견 응답에서 확인한 정확한 이름(weather_current)과 인자를 보냅니다.
        <details><summary>코드 원문(영어) — 복사용</summary><pre>{
  "jsonrpc": "2.0",
  "id": 3,
  "method": "tools/call",
  "params": {
    "name": "weather_current",
    "arguments": { "location": "San Francisco", "units": "imperial" }
  }
}</pre></details></p></div>
        <div class="tp"><p>도구 호출 응답 — content 배열에 텍스트 등 결과가 담겨, AI 앱이 대화의 컨텍스트로 활용합니다.
        <details><summary>코드 원문(영어) — 복사용</summary><pre>{
  "jsonrpc": "2.0",
  "id": 3,
  "result": {
    "content": [
      { "type": "text",
        "text": "Current weather in San Francisco: 68F, partly cloudy..." }
    ]
  }
}</pre></details></p></div>

        <h3>예시: 실시간 갱신 (알림)</h3>
        <p>서버의 도구가 추가·수정·제거되면, 초기화 때 <code>listChanged: true</code>를 선언한 서버는 변경 알림을 보냅니다. 클라이언트는 이를 받아 도구 목록을 다시 요청해 최신 상태로 갱신합니다. 폴링이 필요 없어 효율적이고, AI 앱은 진행 중인 대화에서도 최신 도구를 즉시 반영할 수 있습니다.</p>
        <div class="tp"><p>도구 목록 변경 알림 — id가 없으므로 응답을 기대하지 않는 알림입니다.
        <details><summary>코드 원문(영어) — 복사용</summary><pre>{
  "jsonrpc": "2.0",
  "method": "notifications/tools/list_changed"
}</pre></details></p></div>

        <h3>시작하기</h3>
        <ul>
          <li><strong>서버 만들기</strong> — 내 데이터와 도구를 노출하는 MCP 서버를 만듭니다.</li>
          <li><strong>클라이언트 만들기</strong> — MCP 서버에 연결하는 애플리케이션을 개발합니다.</li>
          <li><strong>MCP 앱 만들기</strong> — AI 클라이언트 안에서 동작하는 인터랙티브 앱을 만듭니다.</li>
          <li>언어별 구현 세부는 해당 SDK 문서를, 더 깊은 개념은 아키텍처 개요 문서를 참고하세요.</li>
        </ul>
        <p style="color:var(--fl-text-tertiary);font-size:12.5px">※ 학습용 한국어 번역본입니다. 표현은 이해를 돕기 위해 다듬었으며, 정확한 원문·최신 명세는 출처 링크를 확인하세요.</p>
      `
    }
  ]
};

(function () {
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  const d = LENS_DOC, m = d.meta, lenses = d.lenses;

  // 헤더
  document.getElementById("head").innerHTML = `
    <div class="lens__icon">${esc(m.icon)}</div>
    <span class="lens__eyebrow">📚 깊이 읽기 · 5가지 렌즈</span>
    <h1 class="lens__title">${esc(m.title)}</h1>
    <p class="lens__oneliner">${esc(m.oneliner)}</p>
    <div class="lens__source">
      <span>📄 출처 <a href="${esc(m.sourceUrl)}" target="_blank" rel="noopener">${esc(m.sourceTitle)} ↗</a></span>
      <span>🗓️ ${esc(m.fetched)}</span>
      <span>🏷️ ${m.tags.map(esc).join(" · ")}</span>
    </div>`;

  // 탭
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = lenses.map((l, i) => `
    <button class="lens-tab" role="tab" data-i="${i}" aria-selected="${i === 0}">${esc(l.icon)} ${esc(l.label)}</button>`).join("");

  const panelEl = document.getElementById("panel");
  function renderQuiz(items) {
    return items.map((it, qi) => `
      <div class="quiz-item">
        <p class="quiz-q"><span>Q${qi + 1}.</span>${esc(it.q)}</p>
        <div class="quiz-opts" data-answer="${it.answer}">
          ${it.options.map((o, oi) => `
            <button class="quiz-opt" type="button" data-oi="${oi}">
              <span class="quiz-opt__mark">${String.fromCharCode(65 + oi)}</span><span>${esc(o)}</span>
            </button>`).join("")}
        </div>
        <div class="quiz-explain"><b>해설.</b> ${esc(it.explain)}</div>
      </div>`).join("");
  }
  function render(i) {
    const l = lenses[i];
    panelEl.innerHTML = `
      ${l.hint ? `<div class="lens-panel__hint"><span>${esc(l.icon)}</span><span>${l.hint}</span></div>` : ""}
      ${l.kind === "quiz" ? renderQuiz(l.quiz) : `<div class="lens-prose">${l.body}</div>`}`;
    panelEl.className = "lens-panel";
  }
  tabsEl.addEventListener("click", (e) => {
    const b = e.target.closest(".lens-tab");
    if (!b) return;
    const i = +b.dataset.i;
    tabsEl.querySelectorAll(".lens-tab").forEach((t) => t.setAttribute("aria-selected", String(+t.dataset.i === i)));
    render(i);
  });
  render(0);

  // 퀴즈 채점 (위임)
  panelEl.addEventListener("click", (e) => {
    const opt = e.target.closest(".quiz-opt");
    if (!opt) return;
    const opts = opt.closest(".quiz-opts");
    if (opt.disabled) return;
    const answer = +opts.dataset.answer;
    const chosen = +opt.dataset.oi;
    opts.querySelectorAll(".quiz-opt").forEach((b) => {
      b.disabled = true;
      const oi = +b.dataset.oi;
      if (oi === answer) b.classList.add("quiz-opt--correct");
      if (oi === chosen && chosen !== answer) b.classList.add("quiz-opt--wrong");
    });
    const ex = opts.parentElement.querySelector(".quiz-explain");
    if (ex) ex.classList.add("open");
  });

  // 푸터
  document.getElementById("foot").innerHTML = `
    <footer class="lens__footer">
      <p>📚 <b>깊이 읽기</b> — 어려운 문서를 5가지 렌즈로 다시 읽는 학습 페이지. 원문을 대체하지 않으며, 정확한 내용은 출처를 확인하세요.</p>
      <p>Folio 디자인 시스템 기반 · 단일 HTML(외부 의존성 없음, 폰트 CDN 제외) · 학습 템플릿: doc-lenses 각색</p>
    </footer>`;
})();

/* 테마 — 기본 시스템 따름, 클릭 시 고정 */
(function () {
  const root = document.documentElement, body = document.body;
  const btn = document.getElementById("themeBtn");
  const mq = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
  const saved = () => { try { return localStorage.getItem("nl-theme"); } catch (e) { return null; } };
  const dark = () => { const s = saved(); return s === "dark" ? true : s === "light" ? false : (mq ? mq.matches : false); };
  const apply = () => body.classList.toggle("fl-dark", dark());
  btn.addEventListener("click", () => { const n = dark() ? "light" : "dark"; try { localStorage.setItem("nl-theme", n); } catch (e) {} root.dataset.nlTheme = n; apply(); });
  if (mq) mq.addEventListener("change", () => { if (!saved()) apply(); });
  apply();
})();
</script>
