<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>데일리 AI 뉴스레터 — 관심사별 큐레이션</title>
<meta name="description" content="러닝 에이전트가 관심사 주제별 탭으로 큐레이션하는 개인화 AI 뉴스레터. 각 주제마다 하나의 핵심 하이라이트." />

<!-- 시스템 다크/라이트를 페인트 전에 반영 (FOUC 방지) -->
<script>
  (function () {
    try {
      var saved = localStorage.getItem("nl-theme"); // "light" | "dark" | null(=시스템)
      if (saved) document.documentElement.dataset.nlTheme = saved;
    } catch (e) {}
  })();
</script>

<style>
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css");

/* ============================================================================
   Folio Design System — 토큰 서브셋 (단일 HTML 인라인)
   원본: claude.ai/design "노션 디자인 시스템" · Notion 컬러 팔레트
   ============================================================================ */
.folio, .folio * { box-sizing: border-box; }

.folio {
  --fl-font-sans: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
    "Apple SD Gothic Neo", "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
  --fl-font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Monaco, Consolas, monospace;
  font-family: var(--fl-font-sans);
  font-feature-settings: "ss03", "cv11";
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;

  /* scales */
  --fl-radius-sm: 4px; --fl-radius: 6px; --fl-radius-md: 8px; --fl-radius-lg: 12px;
  --fl-ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --fl-dur-fast: 120ms; --fl-dur-normal: 180ms;

  /* ---- LIGHT (기본) — Notion 컬러 ---- */
  --fl-bg: #ffffff;
  --fl-surface: #ffffff;
  --fl-surface-2: #f7f6f3;
  --fl-surface-3: #f1f0ec;
  --fl-hover: rgba(55, 53, 47, 0.06);
  --fl-active: rgba(55, 53, 47, 0.12);

  --fl-text: #37352f;
  --fl-text-secondary: #525049;
  --fl-text-tertiary: #787774;
  --fl-text-quaternary: #9b9a97;
  --fl-text-link: #2d6fc5;

  --fl-border-subtle: rgba(15, 14, 12, 0.08);
  --fl-border: rgba(15, 14, 12, 0.13);
  --fl-border-strong: rgba(15, 14, 12, 0.20);

  --fl-accent: #2d6fc5;

  /* Notion 인라인 톤 (플랫) */
  --fl-tint-gray: #777570;   --fl-tint-gray-bg: #f1f0ee;
  --fl-tint-orange: #c46c1f; --fl-tint-orange-bg: #faebdd;
  --fl-tint-yellow: #b58b18; --fl-tint-yellow-bg: #fbf3db;
  --fl-tint-green: #2f8a5d;  --fl-tint-green-bg: #ddedea;
  --fl-tint-blue: #2d6dc4;   --fl-tint-blue-bg: #ddebf1;
  --fl-tint-purple: #6f4ec9; --fl-tint-purple-bg: #eae4f2;
  --fl-tint-pink: #c34e8b;   --fl-tint-pink-bg: #f4dfeb;
  --fl-tint-red: #c84c47;    --fl-tint-red-bg: #fbe4e4;

  --fl-shadow-sm: 0 1px 3px rgba(15, 14, 12, 0.06), 0 1px 2px rgba(15, 14, 12, 0.04);
  --fl-shadow-md: 0 2px 4px rgba(15, 14, 12, 0.04), 0 6px 16px rgba(15, 14, 12, 0.08);
  color-scheme: light;
}

/* ---- DARK 값 (한 곳에 정의) ---- */
.fl-dark, .folio.fl-dark {
  --fl-bg: #191918;
  --fl-surface: #202020;
  --fl-surface-2: #1c1c1b;
  --fl-surface-3: #2a2a28;
  --fl-hover: rgba(255, 253, 248, 0.055);
  --fl-active: rgba(255, 253, 248, 0.13);

  --fl-text: #e9e7e2;
  --fl-text-secondary: #c2bfb7;
  --fl-text-tertiary: #908d85;
  --fl-text-quaternary: #6f6b62;
  --fl-text-link: #8aa9ff;

  --fl-border-subtle: rgba(255, 253, 248, 0.07);
  --fl-border: rgba(255, 253, 248, 0.12);
  --fl-border-strong: rgba(255, 253, 248, 0.20);

  --fl-accent: #8aa9ff;

  --fl-tint-gray: #b0aca5;   --fl-tint-gray-bg: rgba(155,152,145,0.16);
  --fl-tint-orange: #e3a468; --fl-tint-orange-bg: rgba(224,124,42,0.18);
  --fl-tint-yellow: #e0c05a; --fl-tint-yellow-bg: rgba(203,145,38,0.18);
  --fl-tint-green: #6fc193;  --fl-tint-green-bg: rgba(47,138,93,0.20);
  --fl-tint-blue: #7aa0e8;   --fl-tint-blue-bg: rgba(45,109,196,0.22);
  --fl-tint-purple: #b39bf5; --fl-tint-purple-bg: rgba(111,78,201,0.24);
  --fl-tint-pink: #e08fbd;   --fl-tint-pink-bg: rgba(195,78,139,0.20);
  --fl-tint-red: #e08580;    --fl-tint-red-bg: rgba(200,76,71,0.20);

  --fl-shadow-sm: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
  --fl-shadow-md: 0 2px 4px rgba(0,0,0,0.4), 0 6px 16px rgba(0,0,0,0.5);
  color-scheme: dark;
}

/* 1순위: 시스템 설정 자동 반영 (명시적 라이트 지정이 없을 때) */
@media (prefers-color-scheme: dark) {
  html:not([data-nl-theme="light"]) .folio { color-scheme: dark; }
}

/* ============================================================================
   레이아웃
   ============================================================================ */
html, body { margin: 0; padding: 0; }
body {
  background: var(--fl-bg);
  color: var(--fl-text);
  font-family: var(--fl-font-sans);
  font-size: 14px;
  line-height: 1.6;
  transition: background var(--fl-dur-normal), color var(--fl-dur-normal);
}
::selection { background: var(--fl-tint-blue-bg); color: var(--fl-text); }

.nl-page { max-width: 740px; margin: 0 auto; padding: 28px 28px 120px; }

/* ---- 헤더 (그라데이션 없는 노션 페이지) ---- */
.nl-icon { font-size: 58px; line-height: 1; }
.nl-eyebrow {
  margin-top: 18px; font-size: 12px; font-weight: 700;
  letter-spacing: 0.04em; color: var(--fl-text-tertiary);
  display: flex; align-items: center; gap: 8px;
}
.nl-eyebrow__chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 8px; border-radius: 999px;
  background: var(--fl-tint-blue-bg); color: var(--fl-tint-blue);
  font-size: 11px; font-weight: 600;
}
.nl-title {
  font-size: 42px; font-weight: 800; line-height: 1.12;
  letter-spacing: -0.025em; margin: 14px 0 0; word-break: keep-all;
}
.nl-title b { color: var(--fl-accent); font-weight: 800; }
.nl-lead {
  font-size: 17px; line-height: 1.65; color: var(--fl-text-secondary);
  margin: 14px 0 0; max-width: 58ch; word-break: keep-all;
}

/* ---- 메타 행 ---- */
.nl-meta {
  margin-top: 22px; display: flex; flex-wrap: wrap; gap: 6px 18px;
  font-size: 12.5px; color: var(--fl-text-tertiary);
  padding-bottom: 22px; border-bottom: 1px solid var(--fl-border-subtle);
}
.nl-meta span b { color: var(--fl-text-secondary); font-weight: 600; }

/* ---- 인사 콜아웃 (플랫 노션 callout) ---- */
.nl-greet {
  display: flex; gap: 12px; align-items: flex-start;
  margin-top: 22px; padding: 14px 16px;
  background: var(--fl-surface-2); border: 1px solid var(--fl-border-subtle);
  border-radius: var(--fl-radius-md);
  font-size: 14px; line-height: 1.65; color: var(--fl-text-secondary);
}
.nl-greet__icon { font-size: 18px; flex-shrink: 0; line-height: 1.5; }
.nl-greet b { color: var(--fl-text); font-weight: 700; }

/* ---- 탭 바 (doc-lenses 스타일, 노션 플랫) ---- */
.nl-tabs {
  position: sticky; top: 44px; z-index: 20;
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 30px; padding: 12px 0;
  background: var(--fl-bg); border-bottom: 1px solid var(--fl-border-subtle);
}
.nl-tab {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: inherit; font-size: 13px; font-weight: 500;
  color: var(--fl-text-secondary);
  background: var(--fl-surface); border: 1px solid var(--fl-border);
  border-radius: var(--fl-radius-md); padding: 7px 13px;
  cursor: pointer; white-space: nowrap;
  transition: background var(--fl-dur-fast), color var(--fl-dur-fast), border-color var(--fl-dur-fast);
}
.nl-tab:hover { background: var(--fl-hover); color: var(--fl-text); }
.nl-tab[aria-selected="true"] {
  background: var(--fl-text); color: var(--fl-bg);
  border-color: var(--fl-text); font-weight: 600;
}
.nl-tab__dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--tc, var(--fl-text-tertiary)); flex-shrink: 0;
}
.nl-tab[aria-selected="true"] .nl-tab__dot { background: var(--fl-bg); opacity: 0.85; }

/* ---- 패널 ---- */
@keyframes nl-fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.nl-panel { animation: nl-fade 0.32s var(--fl-ease-out); padding-top: 28px; }

/* 주제별 색 (톤 변수 매핑) */
.nl-tint-blue   { --tc: var(--fl-tint-blue);   --tcb: var(--fl-tint-blue-bg); }
.nl-tint-purple { --tc: var(--fl-tint-purple); --tcb: var(--fl-tint-purple-bg); }
.nl-tint-green  { --tc: var(--fl-tint-green);  --tcb: var(--fl-tint-green-bg); }
.nl-tint-orange { --tc: var(--fl-tint-orange); --tcb: var(--fl-tint-orange-bg); }
.nl-tint-pink   { --tc: var(--fl-tint-pink);   --tcb: var(--fl-tint-pink-bg); }

.nl-panel__head { display: flex; align-items: center; gap: 10px; }
.nl-panel__icon { font-size: 22px; line-height: 1; }
.nl-panel__title { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; margin: 0; }
.nl-panel__desc { margin: 8px 0 0; color: var(--fl-text-tertiary); font-size: 13.5px; }

/* 선정 기준 (왜 이 소식인가 — 기본 접힘) */
.nl-criteria { margin-top: 12px; border: 1px solid var(--fl-border-subtle); border-radius: var(--fl-radius-md); background: var(--fl-surface-2); padding: 0 14px; }
.nl-criteria summary { cursor: pointer; list-style: none; padding: 10px 0; font-size: 12.5px; font-weight: 600; color: var(--fl-text-secondary); display: flex; align-items: center; gap: 6px; }
.nl-criteria summary::-webkit-details-marker { display: none; }
.nl-criteria summary::after { content: "▸"; margin-left: auto; color: var(--fl-text-tertiary); font-size: 11px; }
.nl-criteria[open] summary::after { content: "▾"; }
.nl-criteria__body { padding: 0 0 12px; font-size: 13px; line-height: 1.7; color: var(--fl-text-secondary); }
.nl-criteria__body b { color: var(--fl-text); }

/* ---- 핵심 하이라이트 (주제당 1개) ---- */
.nl-hl {
  margin-top: 18px; padding: 22px 24px;
  background: var(--tcb); border: 1px solid var(--tc);
  border-radius: var(--fl-radius-lg);
}
.nl-hl__kicker {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--tc); margin-bottom: 12px;
  padding: 3px 10px; border-radius: 999px;
  background: var(--fl-bg); border: 1px solid var(--tc);
}
.nl-hl__title { font-size: 23px; font-weight: 800; line-height: 1.3; letter-spacing: -0.015em; margin: 0; word-break: keep-all; color: var(--fl-text); }
.nl-hl__summary { margin: 12px 0 0; font-size: 15px; line-height: 1.7; color: var(--fl-text-secondary); }

/* ---- 더 읽을거리 ---- */
.nl-more__label {
  margin: 30px 0 14px; font-size: 12px; font-weight: 700;
  letter-spacing: 0.04em; color: var(--fl-text-tertiary);
  display: flex; align-items: center; gap: 8px;
}
.nl-more__label::after { content: ""; flex: 1; height: 1px; background: var(--fl-border-subtle); }

.nl-grid { display: grid; gap: 12px; }
.nl-card {
  background: var(--fl-surface); border: 1px solid var(--fl-border-subtle);
  border-radius: var(--fl-radius-lg); padding: 16px 18px;
  transition: border-color var(--fl-dur-fast), box-shadow var(--fl-dur-fast);
}
.nl-card:hover { border-color: var(--fl-border); box-shadow: var(--fl-shadow-sm); }
.nl-card__meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 12px; color: var(--fl-text-tertiary); }
.nl-card__dot { width: 3px; height: 3px; border-radius: 50%; background: var(--fl-text-quaternary); }
.nl-card__title { font-size: 16.5px; font-weight: 700; line-height: 1.4; letter-spacing: -0.008em; margin: 9px 0 0; word-break: keep-all; }
.nl-card__summary { margin: 8px 0 0; color: var(--fl-text-secondary); font-size: 13.5px; line-height: 1.65; }

/* 자세히 보기 (긴 글 대응 — 기본 접힘) */
.nl-more-btn {
  margin-top: 9px; display: inline-flex; align-items: center; gap: 4px;
  background: none; border: none; padding: 2px 0; cursor: pointer; font-family: inherit;
  font-size: 13px; font-weight: 600; color: var(--tc, var(--fl-accent));
}
.nl-more-btn:hover .nl-more-btn__t { text-decoration: underline; }
.nl-more-btn__chev { display: inline-block; font-size: 10px; transition: transform var(--fl-dur-fast); }
.nl-more-btn[aria-expanded="true"] .nl-more-btn__chev { transform: rotate(180deg); }
.nl-detail {
  display: none; margin-top: 10px; padding: 12px 14px;
  background: var(--fl-surface-2); border-radius: var(--fl-radius);
  font-size: 13.5px; line-height: 1.7; color: var(--fl-text-secondary); word-break: keep-all;
}
.nl-detail.open { display: block; animation: nl-fade 0.25s var(--fl-ease-out); }
.nl-detail p { margin: 0 0 8px; }
.nl-detail p:last-child { margin: 0; }
.nl-hl .nl-detail { background: var(--fl-bg); }

/* 태그 */
.nl-tag {
  display: inline-flex; align-items: center;
  padding: 1px 9px; height: 21px; border-radius: var(--fl-radius-sm);
  background: var(--tcb, var(--fl-tint-gray-bg)); color: var(--tc, var(--fl-tint-gray));
  font-size: 11.5px; font-weight: 600; white-space: nowrap;
}

/* "나를 위한 한 줄" — 개인화 시그니처 (플랫, 좌측 컬러 보더) */
.nl-foryou {
  margin-top: 13px; display: flex; gap: 10px;
  padding: 10px 13px; background: var(--fl-surface-2);
  border-left: 3px solid var(--tc, var(--fl-accent));
  border-radius: 0 var(--fl-radius) var(--fl-radius) 0;
  font-size: 13px; line-height: 1.6;
}
.nl-foryou__label { flex-shrink: 0; font-weight: 700; color: var(--tc, var(--fl-accent)); font-size: 11px; letter-spacing: 0.03em; padding-top: 1px; }
.nl-foryou__text { color: var(--fl-text); }
.nl-foryou--lg { margin-top: 16px; background: var(--fl-bg); }

/* ---- 푸터 ---- */
.nl-footer { margin-top: 56px; padding-top: 24px; border-top: 1px solid var(--fl-border-subtle); color: var(--fl-text-tertiary); font-size: 13px; line-height: 1.7; }
.nl-footer__brand { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.nl-footer__logo { width: 30px; height: 30px; border-radius: 8px; background: var(--fl-accent); display: flex; align-items: center; justify-content: center; color: var(--fl-bg); font-weight: 800; font-size: 14px; }
.nl-footer__name { color: var(--fl-text); font-weight: 700; font-size: 14px; }
.nl-footer__sub { font-size: 11.5px; }
.nl-footer__next { margin-top: 14px; padding: 13px 16px; background: var(--fl-surface-2); border-radius: var(--fl-radius-md); color: var(--fl-text-secondary); }
.nl-footer__disc { margin-top: 14px; font-size: 11.5px; color: var(--fl-text-quaternary); }

/* ---- 상단 네비게이션 ---- */
.topnav {
  position: sticky; top: 0; z-index: 30;
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px;
  background: color-mix(in srgb, var(--fl-bg) 86%, transparent);
  -webkit-backdrop-filter: saturate(1.5) blur(8px); backdrop-filter: saturate(1.5) blur(8px);
  border-bottom: 1px solid var(--fl-border-subtle);
}
.topnav__brand { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: var(--fl-text); }
.topnav__logo { width: 24px; height: 24px; border-radius: 6px; background: var(--fl-accent); color: var(--fl-bg); display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; }
.topnav__spacer { flex: 1; }
.topnav__link {
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 11px;
  border-radius: var(--fl-radius-md); font-size: 13px; font-weight: 500; color: var(--fl-text-secondary);
  transition: background var(--fl-dur-fast), color var(--fl-dur-fast);
}
.topnav__link:hover { background: var(--fl-hover); color: var(--fl-text); }
.topnav__link--active { background: var(--fl-active); color: var(--fl-text); }

/* ---- 테마 토글 (네비 내 단일 아이콘) ---- */
.nl-theme {
  width: 34px; height: 34px; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid var(--fl-border);
  border-radius: var(--fl-radius-md); color: var(--fl-text-secondary); cursor: pointer;
  transition: background var(--fl-dur-fast), color var(--fl-dur-fast), border-color var(--fl-dur-fast);
}
.nl-theme:hover { background: var(--fl-hover); color: var(--fl-text); }
.nl-theme svg { width: 17px; height: 17px; }
.nl-ico-sun, .nl-ico-moon { display: none; }
body:not(.fl-dark) .nl-ico-sun { display: block; }
body.fl-dark .nl-ico-moon { display: block; }

/* ---- 출처 링크 ---- */
.nl-src {
  display: inline-flex; align-items: center; gap: 3px;
  color: var(--fl-text-tertiary); text-decoration: none;
  border-bottom: 1px dashed var(--fl-border); transition: color var(--fl-dur-fast), border-color var(--fl-dur-fast);
}
.nl-src:hover { color: var(--fl-accent); border-bottom-color: var(--fl-accent); }
.nl-src__ext { font-size: 0.85em; opacity: 0.7; }
.nl-hl__src {
  margin-top: 14px; display: inline-flex; align-items: center; gap: 5px;
  font-size: 12.5px; color: var(--fl-text-tertiary);
}
.nl-hl__src a { color: var(--tc, var(--fl-accent)); border-bottom: 1px dashed var(--tc, var(--fl-accent)); text-decoration: none; padding-bottom: 1px; }
.nl-hl__src a:hover { opacity: 0.8; }

@media (prefers-reduced-motion: reduce) {
  .nl-panel { animation: none; }
  body { transition: none; }
}

/* ---- 모바일 / 외부 접속 최적화 ---- */
@media (max-width: 640px) {
  .nl-page { padding: 20px 16px 96px; }
  .topnav { padding: 8px 14px; gap: 8px; }
  .topnav__brand-t { display: none; }
  .topnav__link { padding: 6px 10px; }
  .nl-icon { font-size: 48px; }
  .nl-title { font-size: 28px; }
  .nl-lead { font-size: 15.5px; }
  .nl-hl { padding: 18px 18px; }
  .nl-hl__title { font-size: 19px; }
  .nl-hl__summary { font-size: 14px; }
  .nl-card { padding: 15px 16px; }

  /* 탭: 줄바꿈 대신 화면 끝까지 닿는 가로 스크롤 스트립 */
  .nl-tabs {
    flex-wrap: nowrap;
    overflow-x: auto;
    margin-left: -16px; margin-right: -16px;
    padding: 11px 16px;
    scroll-snap-type: x proximity;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .nl-tabs::-webkit-scrollbar { display: none; }
  .nl-tab { scroll-snap-align: start; flex: 0 0 auto; padding: 9px 14px; }

  /* 터치 타깃 확대 */
  .nl-theme { width: 40px; height: 40px; }
}

/* 모바일에서 가로 스크롤로 잘린 본문 방지 */
.nl-card__title, .nl-hl__title, .nl-title { overflow-wrap: anywhere; }
</style>
</head>

<body class="folio">

<!-- 상단 네비게이션 — 어느 호에서나 전체 목록으로 이동 -->

/* ============================================================================
   렌더링
   ============================================================================ */
(function () {
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  const html = (s) => s; // 데이터 안의 <b> 허용 (신뢰된 자체 콘텐츠)
  const m = NEWSLETTER.meta;
  const topics = NEWSLETTER.topics;

  // --- 헤더 ---
  document.getElementById("header").innerHTML = `
    <div class="nl-icon">${esc(m.icon)}</div>
    <div class="nl-eyebrow">
      <span class="nl-eyebrow__chip">🗓️ ${esc(m.date)}</span>
      <span>${esc(m.edition)} · ${esc(m.cadence)}</span>
    </div>
    <h1 class="nl-title">${esc(m.title[0])}<b>${esc(m.title[1])}</b></h1>
    <p class="nl-lead">${esc(m.lead)}</p>
    <div class="nl-meta">
      <span>🤖 큐레이터 <b>${esc(m.curator)}</b></span>
      <span>🎯 관심사 <b>${topics.length}</b>개</span>
    </div>
    <div class="nl-greet">
      <span class="nl-greet__icon">👋</span>
      <div>${m.greeting}</div>
    </div>`;

  // --- 탭 ---
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = topics.map((t, i) => `
    <button class="nl-tab nl-tint-${esc(t.tint)}" role="tab" id="tab-${esc(t.id)}"
            data-i="${i}" aria-selected="${i === 0}" aria-controls="panel">
      <span class="nl-tab__dot"></span>${esc(t.icon)} ${esc(t.label)}
    </button>`).join("");

  // --- 패널 ---
  const panelEl = document.getElementById("panel");
  // 긴 글은 기본 접힘 — detail이 있으면 '자세히 보기' 토글을 단다.
  const detailBlock = (d) => d
    ? `<button class="nl-more-btn" type="button" aria-expanded="false"><span class="nl-more-btn__t">자세히 보기</span><span class="nl-more-btn__chev">▾</span></button><div class="nl-detail">${html(d)}</div>`
    : "";
  function articleCard(a) {
    return `
      <article class="nl-card">
        <div class="nl-card__meta">
          <span class="nl-tag">${esc(a.tag)}</span>
          <span class="nl-card__dot"></span>
          ${a.url
            ? `<a class="nl-src" href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.source)}<span class="nl-src__ext">↗</span></a>`
            : `<span>${esc(a.source)}</span>`}
          <span class="nl-card__dot"></span><span>${esc(a.time)}</span>
          ${a.published ? `<span class="nl-card__dot"></span><span>🗓 발행 ${esc(a.published)}</span>` : ""}
        </div>
        <h4 class="nl-card__title">${esc(a.title)}</h4>
        <p class="nl-card__summary">${esc(a.summary)}</p>
        ${detailBlock(a.detail)}
        <div class="nl-foryou">
          <span class="nl-foryou__label">✨ 나를 위한 한 줄</span>
          <span class="nl-foryou__text">${html(a.foryou)}</span>
        </div>
      </article>`;
  }
  function render(i) {
    const t = topics[i];
    panelEl.className = "nl-panel nl-tint-" + t.tint;
    panelEl.setAttribute("aria-labelledby", "tab-" + t.id);
    panelEl.innerHTML = `
      <div class="nl-panel__head">
        <span class="nl-panel__icon">${esc(t.icon)}</span>
        <h3 class="nl-panel__title">${esc(t.label)}</h3>
      </div>
      <p class="nl-panel__desc">${esc(t.desc)}</p>
      ${t.criteria ? `<details class="nl-criteria"><summary>ⓘ 이 소식들은 이렇게 골랐어요</summary><div class="nl-criteria__body">${html(t.criteria)}</div></details>` : ""}

      <section class="nl-hl">
        <span class="nl-hl__kicker">⭐ ${esc(t.highlight.kicker)}</span>
        <h2 class="nl-hl__title">${esc(t.highlight.title)}</h2>
        <p class="nl-hl__summary">${esc(t.highlight.summary)}</p>
        ${detailBlock(t.highlight.detail)}
        ${t.highlight.url
          ? `<div class="nl-hl__src">🔗 출처: <a href="${esc(t.highlight.url)}" target="_blank" rel="noopener">${esc(t.highlight.source || "원문 보기")} ↗</a>${t.highlight.published ? ` · 🗓 발행 ${esc(t.highlight.published)}` : ""}</div>`
          : ""}
        <div class="nl-foryou nl-foryou--lg">
          <span class="nl-foryou__label">✨ 나를 위한 한 줄</span>
          <span class="nl-foryou__text">${html(t.highlight.foryou)}</span>
        </div>
      </section>

      <div class="nl-more__label">더 읽을거리</div>
      <div class="nl-grid">${t.articles.map(articleCard).join("")}</div>`;
  }
  tabsEl.addEventListener("click", (e) => {
    const btn = e.target.closest(".nl-tab");
    if (!btn) return;
    const i = +btn.dataset.i;
    tabsEl.querySelectorAll(".nl-tab").forEach((b) => b.setAttribute("aria-selected", String(+b.dataset.i === i)));
    render(i);
  });
  render(0);

  // '자세히 보기' 토글 (패널은 탭마다 다시 그려지므로 위임)
  panelEl.addEventListener("click", (e) => {
    const b = e.target.closest(".nl-more-btn");
    if (!b) return;
    const open = b.getAttribute("aria-expanded") === "true";
    b.setAttribute("aria-expanded", String(!open));
    const d = b.nextElementSibling;
    if (d && d.classList.contains("nl-detail")) d.classList.toggle("open", !open);
    const t = b.querySelector(".nl-more-btn__t");
    if (t) t.textContent = open ? "자세히 보기" : "접기";
  });

  // --- 푸터 ---
  document.getElementById("footer").innerHTML = `
    <footer class="nl-footer">
      <div class="nl-footer__brand">
        <div class="nl-footer__logo">준</div>
        <div>
          <div class="nl-footer__name">${esc(m.title[0])}${esc(m.title[1])}</div>
          <div class="nl-footer__sub">러닝 에이전트가 ${esc(m.cadence)} 큐레이션 · Folio 디자인 시스템 기반</div>
        </div>
      </div>
      <p>관심사를 바꾸고 싶다면 에이전트에게 한 줄이면 됩니다 — “이번 주는 OO 주제도 탭으로 넣어줘.”</p>
      <div class="nl-footer__next">📮 <b>다음 호 예고 (Vol.08)</b> — “에이전트 평가(eval)를 직접 짜보기”, 레벨3 교육 설계용 AI 페어 코칭 사례.</div>
      <p class="nl-footer__disc">※ 기사 내용은 사내 30분 공유용 <b>데모 샘플</b>입니다. 실제 발행 시 에이전트가 수집한 출처·링크로 교체하세요. · 디자인: Folio (claude.ai/design) · 단일 HTML, 외부 의존성 없음(폰트 CDN 제외).</p>
    </footer>`;
})();

/* ============================================================================
   테마 — 시스템 자동 반영(기본) + 명시적 라이트/다크 오버라이드
   ============================================================================ */
(function () {
  const root = document.documentElement;
  const body = document.body;
  const btn = document.getElementById("themeBtn");
  const mq = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;

  function saved() { try { return localStorage.getItem("nl-theme"); } catch (e) { return null; } }
  function systemDark() { return mq ? mq.matches : false; }
  function resolvedDark() {
    const s = saved();
    if (s === "dark") return true;
    if (s === "light") return false;
    return systemDark(); // 기본: 시스템 설정 따르기
  }
  function apply() { body.classList.toggle("fl-dark", resolvedDark()); }

  btn.addEventListener("click", () => {
    const next = resolvedDark() ? "light" : "dark";
    try { localStorage.setItem("nl-theme", next); } catch (e) {}
    root.dataset.nlTheme = next;
    apply();
  });
  // 오버라이드가 없으면 시스템 설정 변경을 실시간 반영
  if (mq) mq.addEventListener("change", () => { if (!saved()) apply(); });
  apply();
})();
</script>
